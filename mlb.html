// 24 states: 8 base configs × 3 out counts
// runExpectancy[baseState][outs] = avg runs expected to score rest of inning
// Values from 2024 MLB run expectancy matrix

// ════════════════════════════════════════════════════════════════════════════════
// LAYER 3 — PLATE APPEARANCE OUTCOME PROBABILITIES
// Driven by pitcher FIP and batter wRC+
// League average: BB%=8.5, K%=23, 1B%=15, 2B%=4.5, 3B%=0.5, HR%=3.5, Out%=45
// wRC+ and FIP shift these proportionally
// ════════════════════════════════════════════════════════════════════════════════
const LG_AVG_RUNS_PER_GAME = 4.50; // 2025 MLB average

function pitcherRunsPerNine(fip) {
  // Convert FIP to expected R/9 with regression to mean
  return fip * 0.92 + 0.3;
}

function teamRunsPerGame(wrc, oppFIP, parkFactor) {
  // Base: wRC+ scales linearly around 100 = LG_AVG
  const offFactor = wrc / 100;
  const pitchFactor = 4.50 / pitcherRunsPerNine(oppFIP);
  return LG_AVG_RUNS_PER_GAME * offFactor * pitchFactor * parkFactor * 0.5;
  // * 0.5 because park factor is shared between teams
}

function paOutcomes(batter_wrc, pitcher_fip) {
  // Base league average rates
  const lg = { bb:0.085, k:0.230, h1b:0.150, h2b:0.045, h3b:0.005, hr:0.035 };
  // wRC+ modifier (batter strength vs 100 average)
  const offMod = batter_wrc / 100;
  // FIP modifier: lower FIP = harder pitcher
  // League avg FIP ~4.20; each 0.5 below = ~5% better outcomes for pitcher
  const pitchMod = pitcher_fip / 4.20;

  const bb  = Math.min(0.18, Math.max(0.03, lg.bb  * offMod * pitchMod));
  const k   = Math.min(0.40, Math.max(0.10, lg.k   * (1/offMod) * (1/pitchMod)));
  const hr  = Math.min(0.08, Math.max(0.005,lg.hr  * offMod * (2 - pitchMod)));
  const h2b = Math.min(0.07, Math.max(0.01, lg.h2b * offMod * pitchMod));
  const h3b = Math.min(0.015,Math.max(0.001,lg.h3b * offMod));
  const h1b = Math.min(0.22, Math.max(0.05, lg.h1b * offMod * pitchMod));
  const out = Math.max(0.15, 1 - bb - k - hr - h2b - h3b - h1b);

  return { bb, k, hr, h2b, h3b, h1b, out };
}

// ════════════════════════════════════════════════════════════════════════════════
// LAYER 4 — MARKOV CHAIN HALF-INNING SIMULATOR
// Simulates one half-inning through base-out states until 3 outs
// Returns runs scored this half-inning
// ════════════════════════════════════════════════════════════════════════════════
function rand() { return Math.random(); }

function simulateHalfInning(outcomes) {
  let outs = 0;
  let bases = [0, 0, 0]; // [1B, 2B, 3B]
  let runs = 0;

  while (outs < 3) {
    const r = rand();
    let cum = 0;

    if (r < (cum += outcomes.bb)) {
      // Walk: advance all forced, batter to 1B
      if (bases[0] && bases[1] && bases[2]) { runs++; }
      else if (bases[0] && bases[1]) { bases[2] = 1; }
      else if (bases[0]) { bases[1] = 1; }
      bases[0] = 1;
    } else if (r < (cum += outcomes.k)) {
      outs++;
    } else if (r < (cum += outcomes.hr)) {
      runs += 1 + bases[0] + bases[1] + bases[2];
      bases = [0, 0, 0];
    } else if (r < (cum += outcomes.h2b)) {
      runs += bases[2] + bases[1];
      bases[2] = bases[0];
      bases[1] = 1;
      bases[0] = 0;
    } else if (r < (cum += outcomes.h3b)) {
      runs += bases[2] + bases[1] + bases[0];
      bases = [0, 0, 1];
    } else if (r < (cum += outcomes.h1b)) {
      runs += bases[2];
      bases[2] = bases[1];
      bases[1] = bases[0];
      bases[0] = 1;
    } else {
      // Out — approx: 70% groundout (may advance), 30% flyout
      if (rand() < 0.12 && outs < 2 && bases[2]) {
        runs++;
        bases[2] = 0;
      } else if (rand() < 0.15 && bases[0]) {
        bases[1] = Math.max(bases[1], bases[0]);
        bases[0] = 0;
      }
      outs++;
    }
  }
  return runs;
}

// ════════════════════════════════════════════════════════════════════════════════
// LAYER 5 — FULL GAME SIMULATOR
// 9 innings (+ extras), starter exit after N innings, bullpen takes over
// ════════════════════════════════════════════════════════════════════════════════
function simulateGame(homeParams, awayParams, starterInnings = 5) {
  // starterInnings: expected innings for starting pitcher (F5 context)
  const homeOff = paOutcomes(homeParams.wrc, awayParams.teamFIP);
  const awayOff = paOutcomes(awayParams.wrc, homeParams.teamFIP);
  // Bullpen outcomes — worse than starter
  const homeBullpen = paOutcomes(homeParams.wrc, awayParams.bullpenERA);
  const awayBullpen = paOutcomes(awayParams.wrc, homeParams.bullpenERA);

  let homeRuns = 0, awayRuns = 0;
  let homeByInning = [], awayByInning = [];

  const innings = 9;
  for (let inn = 1; inn <= innings; inn++) {
    const awayUsesBullpen = inn > starterInnings;
    const homeUsesBullpen = inn > starterInnings;

    const awayInningOff = awayUsesBullpen ? awayBullpen : awayOff;
    const homeInningOff = homeUsesBullpen ? homeBullpen : homeOff;

    const awayR = simulateHalfInning(awayInningOff);
    let homeR = simulateHalfInning(homeInningOff);

    // Walk-off: if bottom 9+ and home team walks it off
    if (inn >= 9 && homeRuns + homeR > awayRuns + awayR) {
      homeRuns += homeR;
      awayRuns += awayR;
      homeByInning.push(homeR);
      awayByInning.push(awayR);
      break;
    }

    homeRuns += homeR;
    awayRuns += awayR;
    homeByInning.push(homeR);
    awayByInning.push(awayR);
  }

  // Extra innings if tied after 9
  let extraInnings = 0;
  while (homeRuns === awayRuns && extraInnings < 3) {
    extraInnings++;
    // Extra inning rule: ghost runner on 2B
    const awayExtra = simulateHalfInningWithRunner(awayBullpen);
    const homeExtra = simulateHalfInningWithRunner(homeBullpen);
    awayRuns += awayExtra;
    homeRuns += homeExtra;
  }

  const f5HomeRuns = homeByInning.slice(0, 5).reduce((a,b)=>a+b,0);
  const f5AwayRuns = awayByInning.slice(0, 5).reduce((a,b)=>a+b,0);
  const nrfi = homeByInning[0] === 0 && awayByInning[0] === 0;

  return {
    homeRuns, awayRuns,
    winner: homeRuns > awayRuns ? "home" : "away",
    total: homeRuns + awayRuns,
    f5Home: f5HomeRuns, f5Away: f5AwayRuns,
    f5Total: f5HomeRuns + f5AwayRuns,
    f5Winner: f5HomeRuns > f5AwayRuns ? "home" : f5AwayRuns > f5HomeRuns ? "away" : "push",
    nrfi,
    homeByInning, awayByInning,
  };
}

function simulateHalfInningWithRunner(outcomes) {
  // Ghost runner starts on 2B
  let outs = 0;
  let bases = [0, 1, 0]; // runner on 2B
  let runs = 0;
  while (outs < 3) {
    const r = rand();
    let cum = 0;
    if (r < (cum += outcomes.bb)) {
      if (bases[0] && bases[1]) { bases[2] = 1; }
      else if (bases[0]) { bases[1] = 1; }
      bases[0] = 1;
    } else if (r < (cum += outcomes.k)) {
      outs++;
    } else if (r < (cum += outcomes.hr)) {
      runs += 1 + bases[0] + bases[1] + bases[2];
      bases = [0,0,0];
    } else if (r < (cum += outcomes.h2b)) {
      runs += bases[2] + bases[1];
      bases[2] = bases[0]; bases[1] = 1; bases[0] = 0;
    } else if (r < (cum += outcomes.h3b)) {
      runs += bases[2] + bases[1] + bases[0];
      bases = [0,0,1];
    } else if (r < (cum += outcomes.h1b)) {
      runs += bases[2];
      bases[2] = bases[1]; bases[1] = bases[0]; bases[0] = 1;
    } else {
      if (rand() < 0.12 && outs < 2 && bases[2]) { runs++; bases[2] = 0; }
      outs++;
    }
  }
  return runs;
}

// ════════════════════════════════════════════════════════════════════════════════
// MONTE CARLO — runs N simulations, returns aggregate stats
// ════════════════════════════════════════════════════════════════════════════════
function runMLBSim(homeTeam, awayTeam, n = 100000) {
  const hp = TEAM_PARAMS[homeTeam];
  const ap = TEAM_PARAMS[awayTeam];
  if (!hp || !ap) return null;

  // Park factor: use home team's park
  const pf = hp.pf;
  // Scale wRC+ by park factor for this game
  const hAdj = { ...hp, wrc: hp.wrc * pf, pf: 1.0 };
  const aAdj = { ...ap, wrc: ap.wrc * pf, pf: 1.0 };

  const results = [];
  for (let i = 0; i < n; i++) {
    results.push(simulateGame(hAdj, aAdj));
  }
  return aggregateMLB(homeTeam, awayTeam, results, hp, ap, n);
}

function aggregateMLB(homeTeam, awayTeam, results, hp, ap, n) {
  const fmt = (v, d=2) => typeof v === "number" ? v.toFixed(d) : v;
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const pct = (arr, fn) => (arr.filter(fn).length / arr.length * 100).toFixed(1);

  const hWins = results.filter(r=>r.winner==="home").length;
  const aWins = results.filter(r=>r.winner==="away").length;

  const totals = results.map(r=>r.total);
  const avgTotal = avg(totals);
  const avgHome  = avg(results.map(r=>r.homeRuns));
  const avgAway  = avg(results.map(r=>r.awayRuns));

  // Run line (1.5)
  const hRLCover = results.filter(r=>r.homeRuns - r.awayRuns >= 2).length;
  const aRLCover = results.filter(r=>r.awayRuns - r.homeRuns >= 2).length;

  // Totals
  const over75 = results.filter(r=>r.total > 7.5).length;
  const over85 = results.filter(r=>r.total > 8.5).length;
  const over95 = results.filter(r=>r.total > 9.5).length;
  const under75 = results.filter(r=>r.total < 7.5).length;
  const under85 = results.filter(r=>r.total < 8.5).length;

  // F5
  const f5Wins = results.filter(r=>r.f5Winner==="home").length;
  const f5Losses = results.filter(r=>r.f5Winner==="away").length;
  const f5Push = results.filter(r=>r.f5Winner==="push").length;
  const avgF5Total = avg(results.map(r=>r.f5Total));
  const f5Over35 = results.filter(r=>r.f5Total > 3.5).length;
  const f5Over45 = results.filter(r=>r.f5Total > 4.5).length;
  const f5Over25 = results.filter(r=>r.f5Total > 2.5).length;

  // NRFI / YRFI
  const nrfi = results.filter(r=>r.nrfi).length;

  // Score distribution
  const scoreFreq = {};
  results.forEach(r=>{
    const k = r.awayRuns + "-" + r.homeRuns;
    scoreFreq[k] = (scoreFreq[k]||0)+1;
  });
  const topScores = Object.entries(scoreFreq).sort((a,b)=>b[1]-a[1]).slice(0,8)
    .map(([score,count])=>({ score, count, pct:((count/n)*100).toFixed(1) }));

  const [mls] = Object.entries(scoreFreq).sort((a,b)=>b[1]-a[1])[0];

  // Shutout / combined shutout
  const homeShutout = results.filter(r=>r.awayRuns===0).length;
  const awayShutout = results.filter(r=>r.homeRuns===0).length;

  return {
    n, homeTeam, awayTeam, hp, ap,
    hWins, aWins,
    hWPct: fmt((hWins/n)*100,1), aWPct: fmt((aWins/n)*100,1),
    mls, mlsPct: fmt((scoreFreq[mls]/n)*100,1),
    avgHome: fmt(avgHome), avgAway: fmt(avgAway), avgTotal: fmt(avgTotal),
    hRLPct: fmt((hRLCover/n)*100,1), aRLPct: fmt((aRLCover/n)*100,1),
    over75Pct: fmt((over75/n)*100,1), over85Pct: fmt((over85/n)*100,1),
    over95Pct: fmt((over95/n)*100,1),
    under75Pct: fmt((under75/n)*100,1), under85Pct: fmt((under85/n)*100,1),
    f5HomePct: fmt((f5Wins/n)*100,1), f5AwayPct: fmt((f5Losses/n)*100,1),
    f5PushPct: fmt((f5Push/n)*100,1),
    avgF5Total: fmt(avgF5Total),

// ODDS API FETCH
// ════════════════════════════════════════════════════════════════════════════════
async function fetchMLBGames(apiKey) {
  const url = "https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey="
    + apiKey + "&regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=fanduel,draftkings";
  const res = await fetch(url);
  if (!res.ok) throw new Error("API error: " + res.status);
  return res.json();
}

function parseOddsGame(game) {
  // Find best available odds from FanDuel then DraftKings
  const books = game.bookmakers || [];
  const fd = books.find(b=>b.key==="fanduel") || books[0];
  if (!fd) return null;

  let h2h = {}, spread = {}, total = {};
  (fd.markets||[]).forEach(m => {
    if (m.key === "h2h") {
      m.outcomes.forEach(o => {
        if (o.name === game.home_team) h2h.home = o.price;
        else h2h.away = o.price;
      });
    }
    if (m.key === "spreads") {
      m.outcomes.forEach(o => {
        if (o.name === game.home_team) { spread.homePoint = o.point; spread.homePrice = o.price; }
        else { spread.awayPoint = o.point; spread.awayPrice = o.price; }
      });
    }
    if (m.key === "totals") {
      m.outcomes.forEach(o => {
        if (o.name === "Over") { total.line = o.point; total.overPrice = o.price; }
        else total.underPrice = o.price;
      });
    }
  });

  return {
    id: game.id,
    homeTeam: game.home_team,
    awayTeam: game.away_team,
    commenceTime: game.commence_time,
    h2h, spread, total,
  };
}

function fmtOdds(n) {
  if (!n) return "—";
  return n > 0 ? "+"+n : ""+n;
}

function impliedProb(ml) {
  if (!ml) return 0;
  if (ml < 0) return (-ml)/(-ml+100)*100;
  return 100/(ml+100)*100;
}

const GIST_ID = "8a76d2b09c709882e4364528a0152ccc";
const GIST_FILENAME = "sharpsim_bets.json";

// Unit sizing: LOCK=2u, HIGH=1.5u, LEAN=1u
function tierToUnits(tier) {
  if (tier === "LOCK") return 2.0;
  if (tier === "HIGH") return 1.5;
  return 1.0;
}

function tierColor(tier, T) {
  if (tier === "LOCK") return T.red;
  if (tier === "HIGH") return T.green;
  return T.gold;
}

// ── Gist read/write ──────────────────────────────────────────────────────────
async function gistRead(ghToken) {
  const res = await fetch("https://api.github.com/gists/" + GIST_ID, {
    headers: { Authorization: "token " + ghToken, Accept: "application/vnd.github.v3+json" }
  });
  if (!res.ok) throw new Error("Gist read failed: " + res.status);
  const data = await res.json();
  const content = data.files[GIST_FILENAME] && data.files[GIST_FILENAME].content;
  try { return JSON.parse(content || "[]"); } catch { return []; }
}

async function gistWrite(ghToken, bets) {
  const res = await fetch("https://api.github.com/gists/" + GIST_ID, {
    method: "PATCH",
    headers: { Authorization: "token " + ghToken, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(bets, null, 2) } } })
  });
  if (!res.ok) throw new Error("Gist write failed: " + res.status);
  return true;
}

// ── Auto-resolve via Odds API scores ─────────────────────────────────────────
async function autoResolveBets(bets, oddsKey) {
  const pending = bets.filter(b => b.result === "pending");
  if (!pending.length || !oddsKey) return bets;

  const sports = [...new Set(pending.map(b => b.sport))];
  const scoreMap = {};

  for (const sport of sports) {
    const sportKey = sport === "MLB" ? "baseball_mlb" : "soccer_fifa_world_cup";
    try {
      const res = await fetch(
        "https://api.the-odds-api.com/v4/sports/" + sportKey + "/scores/?daysFrom=3&apiKey=" + oddsKey
      );
      if (!res.ok) continue;
      const scores = await res.json();
      scores.forEach(g => {
        // STRICT: only resolve if completed is explicitly true AND scores exist
        // Also guard: game must have started at least 3 hours ago (MLB games ~3hrs)
        // to avoid resolving in-progress games with partial scores
        if (g.completed !== true || !g.scores || !g.scores.length) return;
        const commenceTime = new Date(g.commence_time).getTime();
        const threeHoursMs = 3 * 60 * 60 * 1000;
        if (Date.now() - commenceTime < threeHoursMs) return;
        scoreMap[g.id] = g;
        scoreMap[g.home_team + "|" + g.away_team] = g;
        scoreMap[g.away_team + "|" + g.home_team] = g;
      });
    } catch(e) {}
  }

  return bets.map(bet => {
    if (bet.result !== "pending") return bet;
    const game = scoreMap[bet.gameId] || scoreMap[bet.homeTeam + "|" + bet.awayTeam];
    // Double-check completed flag on the matched game too
    if (!game || game.completed !== true) return bet;

    const homeScore = parseInt((game.scores.find(s => s.name === game.home_team) || {}).score || "0");
    const awayScore = parseInt((game.scores.find(s => s.name !== game.home_team) || {}).score || "0");

    let result = "loss";
    const market = bet.market.toLowerCase();

    if (market.includes("ml") || market.includes("win")) {
      const pickedHome = bet.market.includes(game.home_team);
      if (pickedHome && homeScore > awayScore) result = "win";
      else if (!pickedHome && awayScore > homeScore) result = "win";
      else if (homeScore === awayScore) result = "push";
    } else if (market.includes("over")) {
      const line = parseFloat(bet.market.match(/[\d.]+/) || [0]);
      if (homeScore + awayScore > line) result = "win";
      else if (homeScore + awayScore === line) result = "push";
    } else if (market.includes("under")) {
      const line = parseFloat(bet.market.match(/[\d.]+/) || [0]);
      if (homeScore + awayScore < line) result = "win";
      else if (homeScore + awayScore === line) result = "push";
    } else if (market.includes("nrfi")) {
      if (homeScore === 0 && awayScore === 0) result = "win";
    } else if (market.includes("yrfi")) {
      if (homeScore > 0 || awayScore > 0) result = "win";
    } else if (market.includes("-1.5") || market.includes("run line")) {
      const pickedHome = bet.market.includes(game.home_team);
      if (pickedHome && (homeScore - awayScore) >= 2) result = "win";
      else if (!pickedHome && (awayScore - homeScore) >= 2) result = "win";
    }

    return { ...bet, result, resolvedAt: new Date().toISOString(), finalScore: homeScore + "-" + awayScore };
  });
}

// ── Stats calculator ──────────────────────────────────────────────────────────
function calcStats(bets) {
  const resolved = bets.filter(b => b.result !== "pending");
  const wins = resolved.filter(b => b.result === "win");
  const losses = resolved.filter(b => b.result === "loss");
  const pushes = resolved.filter(b => b.result === "push");
  const totalUnits = resolved.reduce((a, b) => a + (b.result === "win" ? b.units : b.result === "loss" ? -b.units : 0), 0);

  const bySport = {};
  resolved.forEach(b => {
    if (!bySport[b.sport]) bySport[b.sport] = { wins:0, losses:0, pushes:0, units:0 };
    bySport[b.sport].units += b.result === "win" ? b.units : b.result === "loss" ? -b.units : 0;
    if (b.result === "win") bySport[b.sport].wins++;
    else if (b.result === "loss") bySport[b.sport].losses++;
    else bySport[b.sport].pushes++;
  });

  return {
    total: resolved.length, wins: wins.length, losses: losses.length, pushes: pushes.length,
    winPct: resolved.length ? ((wins.length / (resolved.length - pushes.length)) * 100).toFixed(1) : "—",
    totalUnits: totalUnits.toFixed(1),
    pending: bets.filter(b => b.result === "pending").length,
    bySport,
  };
}

// ── Extract top bets from sim agg ─────────────────────────────────────────────
function extractTopBets(agg, game, sport) {
  const bets = [];
  const gameId = game ? game.id : (agg.homeTeam + "|" + agg.awayTeam);
  const homeTeam = agg.homeTeam || game.homeTeam;
  const awayTeam = agg.awayTeam || game.awayTeam;

  function push(market, simPct, bookOdds, tier) {
    bets.push({
      id: Date.now() + "_" + Math.random().toString(36).slice(2,7),
      sport, gameId,
      homeTeam, awayTeam,
      market, simPct, bookOdds,
      tier, units: tierToUnits(tier),
      loggedAt: new Date().toISOString(),
      result: "pending",
      resolvedAt: null, finalScore: null,
      gameDate: new Date().toISOString().slice(0,10),
    });
  }

  if (sport === "MLB" && agg) {
    const hasOdds = game && game.h2h && game.h2h.home;
    const hImp = hasOdds ? impliedProb(game.h2h.home) : 0;
    const aImp = hasOdds ? impliedProb(game.h2h.away) : 0;

    const checks = [
      { market: homeTeam+" ML", pct: parseFloat(agg.hWPct), imp: hImp, odds: hasOdds?fmtOdds(game.h2h.home):"—" },
      { market: awayTeam+" ML", pct: parseFloat(agg.aWPct), imp: aImp, odds: hasOdds?fmtOdds(game.h2h.away):"—" },
      { market: "Over 8.5 Total", pct: parseFloat(agg.over85Pct), imp: 0, odds: hasOdds?fmtOdds(game.total.overPrice):"—" },
      { market: "Under 8.5 Total", pct: parseFloat(agg.under85Pct), imp: 0, odds: hasOdds?fmtOdds(game.total.underPrice):"—" },
      { market: "F5 Over 3.5", pct: parseFloat(agg.f5Over35Pct), imp: 0, odds:"~-110" },
      { market: homeTeam+" F5 Win", pct: parseFloat(agg.f5HomePct), imp: hImp*0.9, odds:"~F5 ML" },
      { market: awayTeam+" F5 Win", pct: parseFloat(agg.f5AwayPct), imp: aImp*0.9, odds:"~F5 ML" },
      { market: "NRFI", pct: parseFloat(agg.nrfiPct), imp: 0, odds:"~-120" },
      { market: "YRFI", pct: parseFloat(agg.yrfiPct), imp: 0, odds:"~-105" },
    ];

    checks.forEach(({ market, pct, imp, odds }) => {
      if (pct >= 70) push(market, pct.toFixed(1)+"%", odds, "LOCK");
      else if (pct >= 60) push(market, pct.toFixed(1)+"%", odds, "HIGH");
      else if (pct > 52 && pct > imp + 3) push(market, pct.toFixed(1)+"%", odds, "LEAN");
    });
  }

  if (sport === "WC" && agg) {
    const checks = [
      { market: homeTeam+" Win", pct: parseFloat(agg.hWPct), odds: "ML" },
      { market: awayTeam+" Win", pct: parseFloat(agg.aWPct), odds: "ML" },
      { market: "Over "+agg.overUnderLine+" Goals", pct: parseFloat(agg.overPct), odds: agg.overOdds||"—" },
      { market: "Under "+agg.overUnderLine+" Goals", pct: parseFloat(agg.underPct), odds: agg.underOdds||"—" },
      { market: homeTeam+" Clean Sheet", pct: parseFloat(agg.csPct), odds:"~Market" },
      { market: "1H Over 0.5 Goals", pct: parseFloat(agg.h1Over05Pct), odds:"~-180" },
      { market: homeTeam+" HT Win", pct: parseFloat(agg.ht_hWPct), odds:"~HT 1X2" },
      { market: "Over 8.5 Corners", pct: parseFloat(agg.cOver85Pct), odds:"~-115" },
      { market: homeTeam+" 1H -0.5 Spread", pct: parseFloat(agg.hSpread1HPct), odds:"~-120" },
    ];
    checks.forEach(({ market, pct, odds }) => {
      if (pct >= 85) push(market, pct.toFixed(1)+"%", odds, "LOCK");
      else if (pct >= 70) push(market, pct.toFixed(1)+"%", odds, "HIGH");
      else if (pct > 52) push(market, pct.toFixed(1)+"%", odds, "LEAN");
    });
  }

  // Sort by simPct desc, then dedupe by market
  return bets.sort((a,b) => parseFloat(b.simPct) - parseFloat(a.simPct));
}

// Bet Logger Hook — manages gist read/write and local state
function useBetLogger(ghToken, oddsKey) {
  const [bets, setBets] = useState([]);
  const [saving, setSaving] = useState(false);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    if (!ghToken) return;
    gistRead(ghToken).then(data => {
      if (oddsKey) {
        autoResolveBets(data, oddsKey).then(resolved => {
          setBets(resolved);
          setLoaded(true);
          if (resolved.some((b,i) => b.result !== data[i]?.result)) {
            gistWrite(ghToken, resolved).catch(console.error);
          }
        });
      } else {
        setBets(data);
        setLoaded(true);
      }
    }).catch(e => {
      console.error("Gist read error:", e);
      setLoaded(true);
    });
  }, [ghToken]);

  async function logBet(bet) {
    if (!ghToken) return;
    setSaving(true);
    const updated = [...bets, bet];
    setBets(updated);
    try { await gistWrite(ghToken, updated); } catch(e) { console.error(e); }
    setSaving(false);
  }

  // Log multiple bets at once, deduping by gameDate+gameId+market
  // A bet is a duplicate if there's already a pending entry for that game+market today
  async function logAllBets(newBets) {
    if (!ghToken || !newBets.length) return;
    setSaving(true);
    const today = new Date().toISOString().slice(0,10);
    const existingKeys = new Set(
      bets
        .filter(b => b.gameDate === today && b.result === "pending")
        .map(b => b.gameId + "|" + b.market)
    );
    const toAdd = newBets.filter(b => !existingKeys.has(b.gameId + "|" + b.market));
    if (!toAdd.length) { setSaving(false); return; }
    const updated = [...bets, ...toAdd];
    setBets(updated);
    try { await gistWrite(ghToken, updated); } catch(e) { console.error(e); }
    setSaving(false);
  }

  async function removeBet(id) {
    if (!ghToken) return;
    const updated = bets.filter(b => b.id !== id);
    setBets(updated);
    try { await gistWrite(ghToken, updated); } catch(e) { console.error(e); }
  }

  const stats = calcStats(bets);
  const today = new Date().toISOString().slice(0,10);
  const isLogged = (gameId, market) =>
    bets.some(b => b.gameId === gameId && b.market === market && b.gameDate === today && b.result === "pending");
  const countLogged = (gameId) =>
    bets.filter(b => b.gameId === gameId && b.gameDate === today && b.result === "pending").length;

  return { bets, stats, logBet, logAllBets, removeBet, saving, loaded, isLogged, countLogged };
}

function signal(simPct, impliedPct, lockThresh=70, highThresh=60, leanThresh=52) {
  const s = parseFloat(simPct);
  if (s >= lockThresh) return "LOCK";
  if (s >= highThresh) return "HIGH";
  if (s > leanThresh && (impliedPct===0 || s > impliedPct + 3)) return "LEAN";
  return "PASS";
}

// TOP PICKS TAB — aggregates best bets across all today's games
// ════════════════════════════════════════════════════════════════════════════════
function TopPicksTab({ simData, games, betLogger }) {
  const { logAllBets, isLogged, stats, saving } = betLogger;
  const autoLoggedRef = useRef(false);

  const allBets = [];
  games.forEach(game => {
    const key = game.homeTeam + "|" + game.awayTeam;
    const agg = simData[key];
    if (!agg) return;
    extractTopBets(agg, game, "MLB").forEach(b => allBets.push({ ...b, gameTime: game.commenceTime }));
  });
  allBets.sort((a,b) => parseFloat(b.simPct) - parseFloat(a.simPct));

  const simsReady = games.filter(g => simData[g.homeTeam+"|"+g.awayTeam]).length;
  const allSimsReady = simsReady === games.length && games.length > 0;

  // Auto-log all bets once all sims are complete and logger is loaded
  useEffect(() => {
    if (!allSimsReady || !betLogger.loaded || autoLoggedRef.current || !allBets.length) return;
    autoLoggedRef.current = true;
    logAllBets(allBets);
  }, [allSimsReady, betLogger.loaded]);

  const locks = allBets.filter(b => b.tier === "LOCK");
  const highs = allBets.filter(b => b.tier === "HIGH");
  const leans = allBets.filter(b => b.tier === "LEAN");

  const loggedCount = allBets.filter(b => isLogged(b.gameId, b.market)).length;

  return (
    <div style={{ maxWidth:920, margin:"0 auto", padding:"0 14px 48px" }}>
      <div style={S.sec}>
        <StatsBanner stats={stats} T={T} S={S} />
        <div style={{ ...S.card, background:"#0a1020", border:"1px solid "+T.green+"33", marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
            <div>
              <div style={{ fontSize:11, color:T.green, fontWeight:700, letterSpacing:"1px" }}>TOP PICKS — TODAY'S SLATE</div>
              <div style={{ fontSize:10, color:T.muted, marginTop:3 }}>
                {simsReady}/{games.length} games simulated · {allBets.length} qualifying signals
                {saving ? " · Saving to Gist..." : allSimsReady && loggedCount > 0 ? " · "+loggedCount+" auto-logged ✓" : ""}
              </div>
            </div>
            <div style={{ display:"flex", gap:6 }}>
              <span style={{ background:T.red+"22", border:"1px solid "+T.red+"44", color:T.red, fontSize:"9px", padding:"2px 7px", borderRadius:3, fontWeight:700 }}>LOCK ≥70% · 2u</span>
              <span style={{ background:T.green+"22", border:"1px solid "+T.green+"44", color:T.green, fontSize:"9px", padding:"2px 7px", borderRadius:3, fontWeight:700 }}>HIGH ≥60% · 1.5u</span>
              <span style={{ background:T.gold+"22", border:"1px solid "+T.gold+"44", color:T.gold, fontSize:"9px", padding:"2px 7px", borderRadius:3, fontWeight:700 }}>LEAN &gt;52% · 1u</span>
            </div>
          </div>
        </div>
      </div>

      {simsReady < games.length && (
        <div style={{ ...S.card, marginBottom:12, fontSize:10, color:T.yellow }}>
          ⚠ {games.length - simsReady} game(s) still simulating — bets will auto-log once all sims complete.
        </div>
      )}

      {[{ label:"LOCK Bets", bets:locks },
        { label:"HIGH Confidence", bets:highs },
        { label:"LEAN Signals", bets:leans }
      ].map(({ label, bets }) => bets.length > 0 && (
        <div key={label} style={S.sec}>
          <div style={S.secLabel}>{label} ({bets.length})</div>
          {bets.map((bet, i) => (
            <TopBetCard key={i} bet={bet} T={T} S={S}
              logged={isLogged(bet.gameId, bet.market)}
            />
          ))}
        </div>
      ))}

      {allBets.length === 0 && simsReady > 0 && (
        <div style={{ ...S.card, textAlign:"center", padding:32, color:T.muted, marginTop:20 }}>No qualifying signals found across today's slate.</div>
      )}

      <div style={S.sec}>
        <div style={S.secLabel}>Bet Log — MLB ({betLogger.bets.filter(b=>b.sport==="MLB").length} bets)</div>
        {betLogger.bets.filter(b=>b.sport==="MLB").length === 0 ? (
          <div style={{ ...S.card, color:T.muted, fontSize:10, textAlign:"center", padding:24 }}>No MLB bets logged yet.</div>
        ) : (
          <div style={S.card}>
            <div style={{ ...S.betRow, fontSize:"8px", fontWeight:700 }}>
              <span style={{ minWidth:120, color:T.muted }}>DATE · SPORT</span>
              <span style={{ flex:2, color:T.muted }}>MARKET</span>
              <span style={{ flex:1, color:T.muted }}>MATCHUP</span>
              <span style={{ color:T.muted }}>TIER</span>
              <span style={{ color:T.muted }}>SIM %</span>
              <span style={{ minWidth:50, textAlign:"right", color:T.muted }}>RESULT</span>
            </div>
            {betLogger.bets.filter(b=>b.sport==="MLB").slice().reverse().map(b => (
              <BetHistoryRow key={b.id} bet={b} T={T} S={S} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// PARLAY TAB — MLB version
// ════════════════════════════════════════════════════════════════════════════════
const PARLAY_SIZE_LABELS = { 2:"2-Leg", 3:"3-Leg", 4:"4-Leg", 5:"5-Leg" };

function buildMLBParlays(simData, games) {
  const allLegs = [];
  games.forEach(game => {
    const key = game.homeTeam + "|" + game.awayTeam;
    const agg = simData[key];
    if (!agg) return;
    const bets = extractTopBets(agg, game, "MLB");
    bets.forEach(b => {
      allLegs.push({ matchId: key, match: b.awayTeam+" @ "+b.homeTeam,
        market: b.market, prob: parseFloat(b.simPct)/100, probPct: b.simPct, tier: b.tier, units: b.units });
    });
  });

  if (allLegs.length === 0) return { legs: allLegs, parlays: [] };

  // Build cross-game combos only
  function buildCombos(legs, size) {
    const results = [];
    function combine(start, current) {
      if (current.length === size) { results.push([...current]); return; }
      for (let i = start; i < legs.length; i++) {
        const matchIds = current.map(l => l.matchId);
        if (!matchIds.includes(legs[i].matchId)) {
          current.push(legs[i]); combine(i+1, current); current.pop();
        }
      }
    }
    combine(0, []);
    return results;
  }

  const parlays = [];
  for (const size of [2,3,4,5]) {
    buildCombos(allLegs, size).forEach(combo => {
      const jp = combo.reduce((acc,leg) => acc * leg.prob, 1);
      parlays.push({ legs:combo, size, jointProb:jp, jointProbPct:(jp*100).toFixed(2) });
    });
  }
  parlays.sort((a,b) => b.jointProb - a.jointProb);
  return { legs: allLegs, parlays: parlays.slice(0,40) };
}

        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {legs.map((leg,i) => {
            const tc = tierColor(leg.tier, T);
            return (
              <div key={i} style={{ background:T.card, border:"1px solid "+T.border, borderLeft:"3px solid "+tc, borderRadius:4, padding:"5px 10px", fontSize:10, display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ background:tc+"22", color:tc, fontSize:"8px", fontWeight:700, padding:"1px 5px", borderRadius:2 }}>{leg.tier}</span>
                <span style={{ color:T.muted, fontSize:9 }}>{leg.match} ·</span>
                <span style={{ color:T.text, fontWeight:700 }}>{leg.market}</span>
                <span style={{ color:tc, marginLeft:2 }}>{leg.probPct}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ ...S.sec, display:"flex", gap:6, flexWrap:"wrap" }}>
        {["all","2","3","4","5"].map(v=>(
          <button key={v} onClick={()=>setFilterSize(v)} style={{ padding:"6px 14px", fontSize:10, fontWeight:700, letterSpacing:"1px", background:filterSize===v?T.green:T.card, color:filterSize===v?"#070b14":T.muted, border:"1px solid "+(filterSize===v?T.green:T.border), borderRadius:4, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>
            {v==="all"?"ALL":v+"-LEG"}
          </button>
        ))}
        <div style={{ marginLeft:"auto", fontSize:10, color:T.muted, alignSelf:"center" }}>Showing {filtered.length} parlays</div>
      </div>

      {filtered.length===0 && <div style={{ ...S.card, textAlign:"center", padding:32, color:T.muted, fontSize:11, marginTop:12 }}>Not enough cross-game signals for {filterSize}-leg parlays.</div>}

      {filtered.map((parlay,pi) => {
        const jp = parlay.jointProb;
        const fairOdds = jp > 0 ? (jp < 0.5 ? "+" + Math.round((1/jp-1)*100) : "-" + Math.round((jp/(1-jp))*100)) : "—";
        const rankColor = pi===0?T.gold:pi===1?"#94a3b8":pi===2?"#cd7f32":T.border;
        const totalUnits = parlay.legs.reduce((a,l)=>a+l.units,0).toFixed(1);

        // Build parlay bet for logging
        const parlayBet = {
          id: Date.now()+"_p"+pi,
          sport:"MLB", gameId:"parlay_"+pi,
          homeTeam:"(parlay)", awayTeam:"("+parlay.size+"-leg)",
          market: parlay.legs.map(l=>l.market).join(" + "),
          simPct: parlay.jointProbPct+"%", bookOdds: fairOdds,
          tier: parlay.legs[0].tier, units: Math.min(parseFloat(totalUnits), 2),
          loggedAt: new Date().toISOString(), result:"pending",
          resolvedAt:null, finalScore:null,
          gameDate: new Date().toISOString().slice(0,10),
        };

        return (
          <div key={pi} style={{ ...S.card, marginTop:10, borderLeft:"3px solid "+(pi<3?rankColor:T.border) }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10, flexWrap:"wrap", gap:6 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ background:pi<3?rankColor+"22":T.navy, border:"1px solid "+(pi<3?rankColor:T.border), color:pi<3?rankColor:T.muted, fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:3 }}>#{pi+1}</div>
                <div style={{ background:T.purple+"1a", border:"1px solid "+T.purple+"33", color:T.purple, fontSize:9, padding:"2px 8px", borderRadius:3, letterSpacing:"1px" }}>{PARLAY_SIZE_LABELS[parlay.size]}</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:22, fontWeight:700, color:jp>0.4?T.green:jp>0.2?T.gold:T.red }}>{parlay.jointProbPct}%</div>
                  <div style={{ fontSize:9, color:T.muted }}>joint probability</div>
                </div>
                <button onClick={()=>logBet(parlayBet)} style={{ background:T.green, color:"#070b14", border:"none", borderRadius:4, padding:"6px 12px", fontSize:9, fontWeight:700, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>
                  + LOG
                </button>
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
              {parlay.legs.map((leg,li) => {
                const tc = tierColor(leg.tier, T);
                return (
                  <div key={li} style={{ display:"flex", alignItems:"center", gap:8, background:T.navy, borderRadius:4, padding:"7px 10px", borderLeft:"2px solid "+tc }}>
                    <span style={{ background:tc+"22", color:tc, fontSize:"8px", fontWeight:700, padding:"1px 5px", borderRadius:2, minWidth:32, textAlign:"center" }}>{leg.tier}</span>
                    <div style={{ fontSize:9, color:T.muted, minWidth:110 }}>{leg.match}</div>
                    <div style={{ flex:1, fontSize:11, color:T.text, fontWeight:600 }}>{leg.market}</div>
                    <div style={{ fontSize:9, color:T.purple }}>{leg.units}u</div>
                    <div style={{ fontSize:11, color:tc, fontWeight:700, minWidth:44, textAlign:"right" }}>{leg.probPct}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", gap:16, marginTop:10, flexWrap:"wrap" }}>
              <div><div style={{ fontSize:9, color:T.muted }}>JOINT PROB</div><div style={{ fontSize:13, fontWeight:700 }}>{parlay.jointProbPct}%</div></div>
              <div><div style={{ fontSize:9, color:T.muted }}>FAIR ODDS (no vig)</div><div style={{ fontSize:13, fontWeight:700, color:T.gold }}>{fairOdds}</div></div>
              <div><div style={{ fontSize:9, color:T.muted }}>LEGS</div><div style={{ fontSize:13, fontWeight:700, color:T.purple }}>{parlay.size}</div></div>
              <div><div style={{ fontSize:9, color:T.muted }}>TOTAL UNITS</div><div style={{ fontSize:13, fontWeight:700, color:T.green }}>{totalUnits}u</div></div>
            </div>
          </div>
        );
      })}
      <div style={S.disclaimer}>Parlay legs assumed independent across games. Fair odds before vig. Not professional betting advice. Gamble responsibly.</div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════════
// API KEY GATE (updated: collects Odds key + GH token)
// ════════════════════════════════════════════════════════════════════════════════
function ApiKeyGate({ onKeys }) {
  const [oddsKey, setOddsKey] = useState("");
  const [ghToken, setGhToken] = useState("");
  const [err, setErr] = useState("");
  const [testing, setTesting] = useState(false);

  useEffect(() => {
    const ok = localStorage.getItem("sharp_odds_key");
    const gt = localStorage.getItem("sharp_gh_token");
    if (ok && gt) onKeys(ok, gt);
    else {
      if (ok) setOddsKey(ok);
      if (gt) setGhToken(gt);
    }
  }, []);

  async function connect() {
    if (!oddsKey.trim() || !ghToken.trim()) { setErr("Both keys required"); return; }
    setTesting(true); setErr("");
    try {
      const r1 = await fetch("https://api.the-odds-api.com/v4/sports?apiKey="+oddsKey.trim());
      if (!r1.ok) throw new Error("Odds API key invalid or quota exceeded");
      const r2 = await fetch("https://api.github.com/gists/"+GIST_ID, { headers:{Authorization:"token "+ghToken.trim()} });
      if (!r2.ok) throw new Error("GitHub token invalid or Gist not accessible");
      localStorage.setItem("sharp_odds_key", oddsKey.trim());
      localStorage.setItem("sharp_gh_token", ghToken.trim());
      onKeys(oddsKey.trim(), ghToken.trim());
    } catch(e) { setErr(e.message); }
    setTesting(false);
  }

  return (
    <div style={{ maxWidth:540, margin:"80px auto", padding:"0 20px" }}>
      <div style={{ ...S.card, border:"1px solid "+T.green+"44" }}>
        <div style={S.badge(T.green)}>⚾ MLB SIM · CONNECT KEYS</div>
        <div style={{ fontSize:13, fontWeight:700, marginBottom:8, marginTop:8 }}>Connect your API keys</div>
        <div style={{ fontSize:10, color:T.muted, lineHeight:1.7, marginBottom:16 }}>
          Keys stored in browser localStorage only — never in source code. Required once per browser.
        </div>
        <div style={{ fontSize:9, color:T.muted, marginBottom:6, letterSpacing:"1px" }}>THE ODDS API KEY</div>
        <input style={S.input} type="password" placeholder="Odds API key..." value={oddsKey} onChange={e=>setOddsKey(e.target.value)} />
        <div style={{ fontSize:9, color:T.muted, margin:"12px 0 6px", letterSpacing:"1px" }}>GITHUB TOKEN (gist scope)</div>
        <input style={S.input} type="password" placeholder="ghp_..." value={ghToken} onChange={e=>setGhToken(e.target.value)} onKeyDown={e=>e.key==="Enter"&&connect()} />
        {err && <div style={{ fontSize:10, color:T.red, marginTop:8 }}>{err}</div>}
        <button style={S.btn(testing, T.green)} onClick={connect} disabled={testing}>
          {testing ? "Verifying..." : "Connect & Load Today's Games"}
        </button>
        <div style={{ fontSize:9, color:T.muted, marginTop:10, lineHeight:1.6 }}>
          <span style={{ color:T.red, cursor:"pointer" }} onClick={()=>{ localStorage.removeItem("sharp_odds_key"); localStorage.removeItem("sharp_gh_token"); setOddsKey(""); setGhToken(""); }}>Reset all keys</span>
          {" "}· Bets logged to GitHub Gist (8a76d2b...)
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════════════════════════
function App() {
  const [oddsKey, setOddsKey] = useState(null);
  const [ghToken, setGhToken] = useState(null);
  const [games, setGames]   = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState("");
  const [activeTab, setActiveTab] = useState("game_0");
  const [simData, setSimData] = useState({});
  const [runningId, setRunningId] = useState(null);
  const [running, setRunning] = useState(false);
  const [runCounts, setRunCounts] = useState({});
  const [manualMode, setManualMode] = useState(false);
  const [manualHome, setManualHome] = useState(TEAM_NAMES[0]);
  const [manualAway, setManualAway] = useState(TEAM_NAMES[1]);
  const autoRanRef = useRef(false);

  const betLogger = useBetLogger(ghToken, oddsKey);

  // Auto-sim all games sequentially once games are loaded
  useEffect(() => {
    if (!games.length || autoRanRef.current) return;
    autoRanRef.current = true;
    let idx = 0;
    function runNext() {
      if (idx >= games.length) return;
      const game = games[idx];
      idx++;
      if (!TEAM_PARAMS[game.homeTeam] || !TEAM_PARAMS[game.awayTeam]) { runNext(); return; }
      const key = game.homeTeam + "|" + game.awayTeam;
      setRunningId(key);
      setTimeout(() => {
        const result = runMLBSim(game.homeTeam, game.awayTeam);
        if (result) {
          setSimData(prev => ({ ...prev, [key]: result }));
          setRunCounts(prev => ({ ...prev, [key]: 1 }));
        }
        setRunningId(null);
        setTimeout(runNext, 30);
      }, 50);
    }
    setTimeout(runNext, 200);
  }, [games]);

  async function loadGames(key) {
    setLoading(true); setError("");
    try {
      const data = await fetchMLBGames(key);
      const parsed = data.map(parseOddsGame).filter(Boolean);
      setGames(parsed);
      setActiveTab("game_0");
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  function handleKeys(ok, gt) {
    setOddsKey(ok); setGhToken(gt);
    loadGames(ok);
  }

  const isSpecialTab = activeTab === "top_picks" || activeTab === "parlays" || activeTab === "custom";
  const activeGameIdx = activeTab.startsWith("game_") ? parseInt(activeTab.split("_")[1]) : 0;
  const activeGame = isSpecialTab ? null : manualMode
    ? { homeTeam:manualHome, awayTeam:manualAway, commenceTime:new Date().toISOString(), h2h:{}, spread:{}, total:{}, id:"custom" }
    : games[activeGameIdx];

  const gameKey = activeGame ? activeGame.homeTeam+"|"+activeGame.awayTeam : null;

  function runSim(game) {
    const g = game || activeGame;
    if (!g || runningId) return;
    const key = g.homeTeam+"|"+g.awayTeam;
    setRunningId(key);
    setTimeout(() => {
      const result = runMLBSim(g.homeTeam, g.awayTeam);
      if (result) {
        setSimData(prev => ({ ...prev, [key]: result }));
        setRunCounts(prev => ({ ...prev, [key]: (prev[key]||0)+1 }));
      }
      setRunningId(null);
    }, 50);
  }

  useEffect(() => {
    if (gameKey && !simData[gameKey] && !runningId && activeGame && TEAM_PARAMS[activeGame.homeTeam] && TEAM_PARAMS[activeGame.awayTeam]) {
      runSim(activeGame);
    }
  }, [gameKey, activeTab]);

  if (!oddsKey || !ghToken) return <div style={S.wrap}><ApiKeyGate onKeys={handleKeys}/></div>;

  const simsLoaded = games.filter(g => simData[g.homeTeam+"|"+g.awayTeam]).length;
  const allSimsReady = games.length > 0 && simsLoaded === games.length;

  const topBetCount = games.reduce((acc,g) => {
    const agg = simData[g.homeTeam+"|"+g.awayTeam];
    if (!agg) return acc;
    return acc + extractTopBets(agg, g, "MLB").length;
  },0);

  return (
    <div style={S.wrap}>
      {/* TOPBAR */}
      <div style={{ background:T.navy, borderBottom:"1px solid "+T.border, padding:"8px 16px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
        <a href="index.html" style={{ fontSize:10, color:T.muted, letterSpacing:"1px" }}>← Sharp Sim</a>
        <div style={{ flex:1 }}/>
        {betLogger.stats.total > 0 && (
          <div style={{ fontSize:10, color:T.muted }}>
            Record: <span style={{ color:T.green }}>{betLogger.stats.wins}W</span>-<span style={{ color:T.red }}>{betLogger.stats.losses}L</span>
            <span style={{ color:parseFloat(betLogger.stats.totalUnits)>=0?T.green:T.red, marginLeft:6 }}>{parseFloat(betLogger.stats.totalUnits)>=0?"+":""}{betLogger.stats.totalUnits}u</span>
          </div>
        )}
        <div style={{ fontSize:9, color:T.muted }}>{games.length > 0 ? games.length+" games" : loading?"Loading...":""}</div>
        <button onClick={()=>{ autoRanRef.current=false; loadGames(oddsKey); }} disabled={loading||!!runningId} style={{ ...S.btn((loading||!!runningId),T.green), width:"auto", padding:"6px 14px", marginTop:0, fontSize:9 }}>
          {loading?"Loading...":"↻ Refresh"}
        </button>
        <button onClick={()=>{ localStorage.removeItem("sharp_odds_key"); localStorage.removeItem("sharp_gh_token"); setOddsKey(null); setGhToken(null); }}
          style={{ background:"none", border:"1px solid "+T.border, color:T.muted, padding:"6px 10px", borderRadius:4, fontSize:9, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>
          ✕ Keys
        </button>
      </div>

      {/* LOADING PROGRESS BAR */}
      {!allSimsReady && games.length > 0 && (
        <div style={{ background:T.navy, padding:"8px 16px", borderBottom:"1px solid "+T.border, display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ flex:1, height:4, background:T.border, borderRadius:2, overflow:"hidden" }}>
            <div style={{ height:"100%", width:(simsLoaded/games.length*100)+"%", background:"linear-gradient(90deg,"+T.green+","+T.gold+")", borderRadius:2, transition:"width 0.5s" }}/>
          </div>
          <div style={{ fontSize:9, color:T.muted, whiteSpace:"nowrap" }}>
            {runningId ? ("Simulating "+(runningId.split("|")[0])+"...") : "Initializing..."} {simsLoaded}/{games.length}
          </div>
        </div>
      )}

      {error && <div style={{ background:"#1a0a0a", border:"1px solid "+T.red+"44", padding:"10px 16px", fontSize:10, color:T.red }}>{error}</div>}

      {/* TABS */}
      <div style={S.tabBar}>
        {games.map((g,i) => (
          <button key={g.id} style={S.tab(activeTab==="game_"+i&&!manualMode)} onClick={()=>{ setActiveTab("game_"+i); setManualMode(false); }}>
            {TEAM_PARAMS[g.awayTeam]?.abbr||g.awayTeam.split(" ").pop()} @ {TEAM_PARAMS[g.homeTeam]?.abbr||g.homeTeam.split(" ").pop()}
            {runningId===(g.homeTeam+"|"+g.awayTeam) ? " ⟳" : !simData[g.homeTeam+"|"+g.awayTeam] ? " ·" : ""}
          </button>
        ))}
        <button style={{ ...S.tab(manualMode), color:manualMode?T.purple:T.muted, borderBottom:manualMode?"2px solid "+T.purple:"2px solid transparent" }} onClick={()=>{ setManualMode(true); setActiveTab("custom"); }}>
          + Custom
        </button>
        <div style={{ flex:1 }}/>
        <button style={{ ...S.tab(activeTab==="top_picks"), color:activeTab==="top_picks"?T.green:T.muted, borderBottom:activeTab==="top_picks"?"2px solid "+T.green:"2px solid transparent", borderLeft:"1px solid "+T.border }}
          onClick={()=>{ setManualMode(false); setActiveTab("top_picks"); }}>
          ⭐ TOP PICKS {topBetCount>0?"("+topBetCount+")":""}
        </button>
        <button style={{ ...S.tab(activeTab==="parlays"), color:activeTab==="parlays"?T.purple:T.muted, borderBottom:activeTab==="parlays"?"2px solid "+T.purple:"2px solid transparent" }}
          onClick={()=>{ setManualMode(false); setActiveTab("parlays"); }}>
          🎰 PARLAYS
        </button>
      </div>

      {/* MANUAL SELECTOR */}
      {manualMode && (
        <div style={{ background:T.navy, borderBottom:"1px solid "+T.border, padding:"12px 16px", display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
          <span style={{ fontSize:10, color:T.muted }}>Away:</span>
          <select value={manualAway} onChange={e=>setManualAway(e.target.value)} style={{ ...S.input, width:"auto", flex:1, minWidth:180 }}>
            {TEAM_NAMES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
          <span style={{ fontSize:10, color:T.muted }}>@</span>
          <span style={{ fontSize:10, color:T.muted }}>Home:</span>
          <select value={manualHome} onChange={e=>setManualHome(e.target.value)} style={{ ...S.input, width:"auto", flex:1, minWidth:180 }}>
            {TEAM_NAMES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
      )}

      {/* CONTENT */}
      {activeTab==="top_picks" && <TopPicksTab simData={simData} games={games} betLogger={betLogger}/>}
      {activeTab==="parlays" && <MLBParlayTab simData={simData} games={games} betLogger={betLogger}/>}
      {!["top_picks","parlays"].includes(activeTab) && activeGame && TEAM_PARAMS[activeGame.homeTeam] && TEAM_PARAMS[activeGame.awayTeam] && (
        <GameSimView game={activeGame} agg={simData[gameKey]}
          running={runningId === gameKey}
          runCount={runCounts[gameKey]||0}
          onRun={()=>runSim(activeGame)}
          betLogger={betLogger}
        />
      )}
      {!["top_picks","parlays"].includes(activeTab) && activeGame && (!TEAM_PARAMS[activeGame.homeTeam]||!TEAM_PARAMS[activeGame.awayTeam]) && (
        <div style={{ textAlign:"center", padding:48, color:T.muted, fontSize:11 }}>Team not in model: {activeGame.homeTeam} vs {activeGame.awayTeam}</div>
      )}
      {!["top_picks","parlays"].includes(activeTab) && !activeGame && (
        <div style={{ textAlign:"center", padding:48, color:T.muted, fontSize:11 }}>{loading?"Loading today's games...":"No games found."}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
