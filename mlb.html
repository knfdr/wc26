// 24 states: 8 base configs × 3 out counts
// runExpectancy[baseState][outs] = avg runs expected to score rest of inning
// Values from 2024 MLB run expectancy matrix

// ════════════════════════════════════════════════════════════════════════════════
// LAYER 3 — PLATE APPEARANCE OUTCOME PROBABILITIES
// Driven by pitcher FIP and batter wRC+
// League average: BB%=8.5, K%=23, 1B%=15, 2B%=4.5, 3B%=0.5, HR%=3.5, Out%=45
// wRC+ and FIP shift these proportionally
// ════════════════════════════════════════════════════════════════════════════════
const LG_AVG_RUNS_PER_GAME = 4.50; // 2025 MLB average

function pitcherRunsPerNine(fip) {
  // Convert FIP to expected R/9 with regression to mean
  return fip * 0.92 + 0.3;
}

function teamRunsPerGame(wrc, oppFIP, parkFactor) {
  // Base: wRC+ scales linearly around 100 = LG_AVG
  const offFactor = wrc / 100;
  const pitchFactor = 4.50 / pitcherRunsPerNine(oppFIP);
  return LG_AVG_RUNS_PER_GAME * offFactor * pitchFactor * parkFactor * 0.5;
  // * 0.5 because park factor is shared between teams
}

function paOutcomes(batter_wrc, pitcher_fip) {
  // Base league average rates
  const lg = { bb:0.085, k:0.230, h1b:0.150, h2b:0.045, h3b:0.005, hr:0.035 };
  // wRC+ modifier (batter strength vs 100 average)
  const offMod = batter_wrc / 100;
  // FIP modifier: lower FIP = harder pitcher
  // League avg FIP ~4.20; each 0.5 below = ~5% better outcomes for pitcher
  const pitchMod = pitcher_fip / 4.20;

  const bb  = Math.min(0.18, Math.max(0.03, lg.bb  * offMod * pitchMod));
  const k   = Math.min(0.40, Math.max(0.10, lg.k   * (1/offMod) * (1/pitchMod)));
  const hr  = Math.min(0.08, Math.max(0.005,lg.hr  * offMod * (2 - pitchMod)));
  const h2b = Math.min(0.07, Math.max(0.01, lg.h2b * offMod * pitchMod));
  const h3b = Math.min(0.015,Math.max(0.001,lg.h3b * offMod));
  const h1b = Math.min(0.22, Math.max(0.05, lg.h1b * offMod * pitchMod));
  const out = Math.max(0.15, 1 - bb - k - hr - h2b - h3b - h1b);

  return { bb, k, hr, h2b, h3b, h1b, out };
}

// ════════════════════════════════════════════════════════════════════════════════
// LAYER 4 — MARKOV CHAIN HALF-INNING SIMULATOR
// Simulates one half-inning through base-out states until 3 outs
// Returns runs scored this half-inning
// ════════════════════════════════════════════════════════════════════════════════
function rand() { return Math.random(); }

function simulateHalfInning(outcomes) {
  let outs = 0;
  let bases = [0, 0, 0]; // [1B, 2B, 3B]
  let runs = 0;

  while (outs < 3) {
    const r = rand();
    let cum = 0;

    if (r < (cum += outcomes.bb)) {
      // Walk: advance all forced, batter to 1B
      if (bases[0] && bases[1] && bases[2]) { runs++; }
      else if (bases[0] && bases[1]) { bases[2] = 1; }
      else if (bases[0]) { bases[1] = 1; }
      bases[0] = 1;
    } else if (r < (cum += outcomes.k)) {
      outs++;
    } else if (r < (cum += outcomes.hr)) {
      runs += 1 + bases[0] + bases[1] + bases[2];
      bases = [0, 0, 0];
    } else if (r < (cum += outcomes.h2b)) {
      runs += bases[2] + bases[1];
      bases[2] = bases[0];
      bases[1] = 1;
      bases[0] = 0;
    } else if (r < (cum += outcomes.h3b)) {
      runs += bases[2] + bases[1] + bases[0];
      bases = [0, 0, 1];
    } else if (r < (cum += outcomes.h1b)) {
      runs += bases[2];
      bases[2] = bases[1];
      bases[1] = bases[0];
      bases[0] = 1;
    } else {
      // Out — approx: 70% groundout (may advance), 30% flyout
      if (rand() < 0.12 && outs < 2 && bases[2]) {
        runs++;
        bases[2] = 0;
      } else if (rand() < 0.15 && bases[0]) {
        bases[1] = Math.max(bases[1], bases[0]);
        bases[0] = 0;
      }
      outs++;
    }
  }
  return runs;
}

// ════════════════════════════════════════════════════════════════════════════════
// LAYER 5 — FULL GAME SIMULATOR
// 9 innings (+ extras), starter exit after N innings, bullpen takes over
// ════════════════════════════════════════════════════════════════════════════════
function simulateGame(homeParams, awayParams, starterInnings = 5) {
  // starterInnings: expected innings for starting pitcher (F5 context)
  const homeOff = paOutcomes(homeParams.wrc, awayParams.teamFIP);
  const awayOff = paOutcomes(awayParams.wrc, homeParams.teamFIP);
  // Bullpen outcomes — worse than starter
  const homeBullpen = paOutcomes(homeParams.wrc, awayParams.bullpenERA);
  const awayBullpen = paOutcomes(awayParams.wrc, homeParams.bullpenERA);

  let homeRuns = 0, awayRuns = 0;
  let homeByInning = [], awayByInning = [];

  const innings = 9;
  for (let inn = 1; inn <= innings; inn++) {
    const awayUsesBullpen = inn > starterInnings;
    const homeUsesBullpen = inn > starterInnings;

    const awayInningOff = awayUsesBullpen ? awayBullpen : awayOff;
    const homeInningOff = homeUsesBullpen ? homeBullpen : homeOff;

    const awayR = simulateHalfInning(awayInningOff);
    let homeR = simulateHalfInning(homeInningOff);

    // Walk-off: if bottom 9+ and home team walks it off
    if (inn >= 9 && homeRuns + homeR > awayRuns + awayR) {
      homeRuns += homeR;
      awayRuns += awayR;
      homeByInning.push(homeR);
      awayByInning.push(awayR);
      break;
    }

    homeRuns += homeR;
    awayRuns += awayR;
    homeByInning.push(homeR);
    awayByInning.push(awayR);
  }

  // Extra innings if tied after 9
  let extraInnings = 0;
  while (homeRuns === awayRuns && extraInnings < 3) {
    extraInnings++;
    // Extra inning rule: ghost runner on 2B
    const awayExtra = simulateHalfInningWithRunner(awayBullpen);
    const homeExtra = simulateHalfInningWithRunner(homeBullpen);
    awayRuns += awayExtra;
    homeRuns += homeExtra;
  }

  const f5HomeRuns = homeByInning.slice(0, 5).reduce((a,b)=>a+b,0);
  const f5AwayRuns = awayByInning.slice(0, 5).reduce((a,b)=>a+b,0);
  const nrfi = homeByInning[0] === 0 && awayByInning[0] === 0;

  return {
    homeRuns, awayRuns,
    winner: homeRuns > awayRuns ? "home" : "away",
    total: homeRuns + awayRuns,
    f5Home: f5HomeRuns, f5Away: f5AwayRuns,
    f5Total: f5HomeRuns + f5AwayRuns,
    f5Winner: f5HomeRuns > f5AwayRuns ? "home" : f5AwayRuns > f5HomeRuns ? "away" : "push",
    nrfi,
    homeByInning, awayByInning,
  };
}

function simulateHalfInningWithRunner(outcomes) {
  // Ghost runner starts on 2B
  let outs = 0;
  let bases = [0, 1, 0]; // runner on 2B
  let runs = 0;
  while (outs < 3) {
    const r = rand();
    let cum = 0;
    if (r < (cum += outcomes.bb)) {
      if (bases[0] && bases[1]) { bases[2] = 1; }
      else if (bases[0]) { bases[1] = 1; }
      bases[0] = 1;
    } else if (r < (cum += outcomes.k)) {
      outs++;
    } else if (r < (cum += outcomes.hr)) {
      runs += 1 + bases[0] + bases[1] + bases[2];
      bases = [0,0,0];
    } else if (r < (cum += outcomes.h2b)) {
      runs += bases[2] + bases[1];
      bases[2] = bases[0]; bases[1] = 1; bases[0] = 0;
    } else if (r < (cum += outcomes.h3b)) {
      runs += bases[2] + bases[1] + bases[0];
      bases = [0,0,1];
    } else if (r < (cum += outcomes.h1b)) {
      runs += bases[2];
      bases[2] = bases[1]; bases[1] = bases[0]; bases[0] = 1;
    } else {
      if (rand() < 0.12 && outs < 2 && bases[2]) { runs++; bases[2] = 0; }
      outs++;
    }
  }
  return runs;
}

// ════════════════════════════════════════════════════════════════════════════════
// MONTE CARLO — runs N simulations, returns aggregate stats
// ════════════════════════════════════════════════════════════════════════════════
function runMLBSim(homeTeam, awayTeam, n = 100000) {
  const hp = TEAM_PARAMS[homeTeam];
  const ap = TEAM_PARAMS[awayTeam];
  if (!hp || !ap) return null;

  // Park factor: use home team's park
  const pf = hp.pf;
  // Scale wRC+ by park factor for this game
  const hAdj = { ...hp, wrc: hp.wrc * pf, pf: 1.0 };
  const aAdj = { ...ap, wrc: ap.wrc * pf, pf: 1.0 };

  const results = [];
  for (let i = 0; i < n; i++) {
    results.push(simulateGame(hAdj, aAdj));
  }
  return aggregateMLB(homeTeam, awayTeam, results, hp, ap, n);
}

function aggregateMLB(homeTeam, awayTeam, results, hp, ap, n) {
  const fmt = (v, d=2) => typeof v === "number" ? v.toFixed(d) : v;
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const pct = (arr, fn) => (arr.filter(fn).length / arr.length * 100).toFixed(1);

  const hWins = results.filter(r=>r.winner==="home").length;
  const aWins = results.filter(r=>r.winner==="away").length;

  const totals = results.map(r=>r.total);
  const avgTotal = avg(totals);
  const avgHome  = avg(results.map(r=>r.homeRuns));
  const avgAway  = avg(results.map(r=>r.awayRuns));

  // Run line (1.5)
  const hRLCover = results.filter(r=>r.homeRuns - r.awayRuns >= 2).length;
  const aRLCover = results.filter(r=>r.awayRuns - r.homeRuns >= 2).length;

  // Totals
  const over75 = results.filter(r=>r.total > 7.5).length;
  const over85 = results.filter(r=>r.total > 8.5).length;
  const over95 = results.filter(r=>r.total > 9.5).length;
  const under75 = results.filter(r=>r.total < 7.5).length;
  const under85 = results.filter(r=>r.total < 8.5).length;

  // F5
  const f5Wins = results.filter(r=>r.f5Winner==="home").length;
  const f5Losses = results.filter(r=>r.f5Winner==="away").length;
  const f5Push = results.filter(r=>r.f5Winner==="push").length;
  const avgF5Total = avg(results.map(r=>r.f5Total));
  const f5Over35 = results.filter(r=>r.f5Total > 3.5).length;
  const f5Over45 = results.filter(r=>r.f5Total > 4.5).length;
  const f5Over25 = results.filter(r=>r.f5Total > 2.5).length;

  // NRFI / YRFI
  const nrfi = results.filter(r=>r.nrfi).length;

  // Score distribution
  const scoreFreq = {};
  results.forEach(r=>{
    const k = r.awayRuns + "-" + r.homeRuns;
    scoreFreq[k] = (scoreFreq[k]||0)+1;
  });
  const topScores = Object.entries(scoreFreq).sort((a,b)=>b[1]-a[1]).slice(0,8)
    .map(([score,count])=>({ score, count, pct:((count/n)*100).toFixed(1) }));

  const [mls] = Object.entries(scoreFreq).sort((a,b)=>b[1]-a[1])[0];

  // Shutout / combined shutout
  const homeShutout = results.filter(r=>r.awayRuns===0).length;
  const awayShutout = results.filter(r=>r.homeRuns===0).length;

  return {
    n, homeTeam, awayTeam, hp, ap,
    hWins, aWins,
    hWPct: fmt((hWins/n)*100,1), aWPct: fmt((aWins/n)*100,1),
    mls, mlsPct: fmt((scoreFreq[mls]/n)*100,1),
    avgHome: fmt(avgHome), avgAway: fmt(avgAway), avgTotal: fmt(avgTotal),
    hRLPct: fmt((hRLCover/n)*100,1), aRLPct: fmt((aRLCover/n)*100,1),
    over75Pct: fmt((over75/n)*100,1), over85Pct: fmt((over85/n)*100,1),
    over95Pct: fmt((over95/n)*100,1),
    under75Pct: fmt((under75/n)*100,1), under85Pct: fmt((under85/n)*100,1),
    f5HomePct: fmt((f5Wins/n)*100,1), f5AwayPct: fmt((f5Losses/n)*100,1),
    f5PushPct: fmt((f5Push/n)*100,1),
    avgF5Total: fmt(avgF5Total),
    f5Over25Pct: fmt((f5Over25/n)*100,1),
    f5Over35Pct: fmt((f5Over35/n)*100,1),
    f5Over45Pct: fmt((f5Over45/n)*100,1),
    nrfiPct: fmt((nrfi/n)*100,1), yrfiPct: fmt(((n-nrfi)/n)*100,1),
    homeShutoutPct: fmt((homeShutout/n)*100,1),
    awayShutoutPct: fmt((awayShutout/n)*100,1),
    topScores,
  };
}

// ════════════════════════════════════════════════════════════════════════════════
// ODDS API FETCH
// ════════════════════════════════════════════════════════════════════════════════
async function fetchMLBGames(apiKey) {
  const url = "https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey="
    + apiKey + "&regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=fanduel,draftkings";
  const res = await fetch(url);
  if (!res.ok) throw new Error("API error: " + res.status);
  return res.json();
}

function parseOddsGame(game) {
  // Find best available odds from FanDuel then DraftKings
  const books = game.bookmakers || [];
  const fd = books.find(b=>b.key==="fanduel") || books[0];
  if (!fd) return null;

  let h2h = {}, spread = {}, total = {};
  (fd.markets||[]).forEach(m => {
    if (m.key === "h2h") {
      m.outcomes.forEach(o => {
        if (o.name === game.home_team) h2h.home = o.price;
        else h2h.away = o.price;
      });
    }
    if (m.key === "spreads") {
      m.outcomes.forEach(o => {
        if (o.name === game.home_team) { spread.homePoint = o.point; spread.homePrice = o.price; }
        else { spread.awayPoint = o.point; spread.awayPrice = o.price; }
      });
    }
    if (m.key === "totals") {
      m.outcomes.forEach(o => {
        if (o.name === "Over") { total.line = o.point; total.overPrice = o.price; }
        else total.underPrice = o.price;
      });
    }
  });

  return {
    id: game.id,
    homeTeam: game.home_team,
    awayTeam: game.away_team,
    commenceTime: game.commence_time,
    h2h, spread, total,
  };
}

function fmtOdds(n) {
  if (!n) return "—";
  return n > 0 ? "+"+n : ""+n;
}

function impliedProb(ml) {
  if (!ml) return 0;
  if (ml < 0) return (-ml)/(-ml+100)*100;
  return 100/(ml+100)*100;
}

function StatCard({ label, value, sub, color }) {
  return (
    <div style={S.card}>
      <div style={S.sL}>{label}</div>
      <div style={{ ...S.sV, color:color||T.text }}>{value}</div>
      {sub && <div style={S.sSub}>{sub}</div>}
    </div>
  );
}

function BetRow({ market, simPct, bookOdds, signal }) {
  const sc = signal==="LEAN"?T.gold:signal==="PASS"?T.muted:signal==="CONSIDER"?"#f97316":signal==="LOCK"?T.red:signal==="HIGH"?T.green:T.muted;
  return (
    <div style={S.betRow}>
      <span style={{ color:T.muted, minWidth:160, fontSize:10 }}>{market}</span>
      <span style={{ flex:1, textAlign:"center", fontSize:11 }}>{simPct}</span>
      <span style={{ color:T.muted, flex:1, textAlign:"center", fontSize:10 }}>{bookOdds}</span>
      <span style={S.pill(sc)}>{signal}</span>
    </div>
  );
}

function signal(simPct, impliedPct, lockThresh=70, highThresh=60, leanThresh=52) {
  const s = parseFloat(simPct);
  if (s >= lockThresh) return "LOCK";
  if (s >= highThresh) return "HIGH";
  if (s > leanThresh && (impliedPct===0 || s > impliedPct + 3)) return "LEAN";
  return "PASS";
}

function ApiKeyGate({ onKey }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState("");
  const [testing, setTesting] = useState(false);

  const stored = localStorage.getItem("sharp_odds_key");

  useEffect(() => {
    if (stored) onKey(stored);
  }, []);

  async function test() {
    if (!val.trim()) { setErr("Enter your API key"); return; }
    setTesting(true); setErr("");
    try {
      const res = await fetch("https://api.the-odds-api.com/v4/sports?apiKey=" + val.trim());
      if (!res.ok) throw new Error("Invalid key or quota exceeded");
      localStorage.setItem("sharp_odds_key", val.trim());
      onKey(val.trim());
    } catch(e) {
      setErr(e.message);
    }
    setTesting(false);
  }

  return (
    <div style={{ maxWidth:520, margin:"80px auto", padding:"0 20px" }}>

        </div>
        <input
          style={S.input}
          type="password"
          placeholder="Paste your API key..."
          value={val}
          onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&test()}
        />
        {err && <div style={{ fontSize:10, color:T.red, marginTop:8 }}>{err}</div>}
        <button style={S.btn(testing, T.green)} onClick={test} disabled={testing}>
          {testing ? "Verifying..." : "Connect & Load Today's Games"}

        <div style={{ fontSize:9, color:T.muted, marginTop:10, lineHeight:1.6 }}>

        </div>
      </div>
    </div>
  );
}

// MAIN APP
// ════════════════════════════════════════════════════════════════════════════════
function App() {
  const [apiKey, setApiKey] = useState(null);
  const [games, setGames]   = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState("");
  const [activeIdx, setActiveIdx] = useState(0);
  const [simData, setSimData] = useState({});
  const [running, setRunning] = useState(false);
  const [runCounts, setRunCounts] = useState({});
  // Manual team selectors for when a team isn't in the API games
  const [manualMode, setManualMode] = useState(false);
  const [manualHome, setManualHome] = useState(TEAM_NAMES[0]);
  const [manualAway, setManualAway] = useState(TEAM_NAMES[1]);

  async function loadGames(key) {
    setLoading(true); setError("");
    try {
      const data = await fetchMLBGames(key);
      const parsed = data.map(parseOddsGame).filter(Boolean);
      setGames(parsed);
      setActiveIdx(0);
    } catch(e) {
      setError(e.message);
    }
    setLoading(false);
  }

  function handleKey(key) {
    setApiKey(key);
    loadGames(key);
  }

  const activeGame = manualMode
    ? { homeTeam: manualHome, awayTeam: manualAway, commenceTime: new Date().toISOString(), h2h:{}, spread:{}, total:{} }
    : games[activeIdx];

  const gameKey = activeGame ? activeGame.homeTeam + "|" + activeGame.awayTeam : null;

  function runSim() {
    if (!activeGame || running) return;
    setRunning(true);
    setTimeout(() => {
      const result = runMLBSim(activeGame.homeTeam, activeGame.awayTeam);
      if (result) {
        setSimData(prev => ({ ...prev, [gameKey]: result }));
        setRunCounts(prev => ({ ...prev, [gameKey]: (prev[gameKey]||0)+1 }));
      }
      setRunning(false);
    }, 50);
  }

  // Auto-run when game changes and no data yet
  useEffect(() => {
    if (gameKey && !simData[gameKey] && !running && TEAM_PARAMS[activeGame.homeTeam] && TEAM_PARAMS[activeGame.awayTeam]) {
      runSim();
    }
  }, [gameKey]);

  if (!apiKey) return <div style={S.wrap}><ApiKeyGate onKey={handleKey}/></div>;

  return (
    <div style={S.wrap}>
      {/* TOPBAR */}
      <div style={{ background:T.navy, borderBottom:"1px solid "+T.border, padding:"8px 16px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
        <a href="index.html" style={{ fontSize:10, color:T.muted, letterSpacing:"1px", display:"flex", alignItems:"center", gap:6 }}>
          ← Sharp Sim
        </a>
        <div style={{ flex:1 }}/>
        <div style={{ fontSize:9, color:T.muted }}>
          {games.length > 0 ? games.length + " games loaded" : loading ? "Loading..." : ""}
        </div>
        <button onClick={()=>loadGames(apiKey)} disabled={loading} style={{ ...S.btn(loading, T.green), width:"auto", padding:"6px 14px", marginTop:0, fontSize:9 }}>
          {loading ? "Loading..." : "↻ Refresh Odds"}
        </button>
        <button onClick={()=>{ localStorage.removeItem("sharp_odds_key"); setApiKey(null); }} style={{ background:"none", border:"1px solid "+T.border, color:T.muted, padding:"6px 10px", borderRadius:4, fontSize:9, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>
          ✕ Key
        </button>
      </div>

      {error && <div style={{ background:"#1a0a0a", border:"1px solid "+T.red+"44", padding:"10px 16px", fontSize:10, color:T.red }}>{error}</div>}

      {/* GAME TABS */}
      <div style={S.tabBar}>
        {games.map((g, i) => (
          <button key={g.id} style={S.tab(i===activeIdx && !manualMode)} onClick={()=>{ setActiveIdx(i); setManualMode(false); }}>
            {TEAM_PARAMS[g.awayTeam]?.abbr||g.awayTeam.split(" ").pop()} @ {TEAM_PARAMS[g.homeTeam]?.abbr||g.homeTeam.split(" ").pop()}
          </button>
        ))}
        <button style={{ ...S.tab(manualMode), color:manualMode?T.purple:T.muted, borderBottom:manualMode?"2px solid "+T.purple:"2px solid transparent", borderLeft:"1px solid "+T.border, marginLeft:4 }}
          onClick={()=>setManualMode(true)}>
          + Custom
        </button>
      </div>

      {/* MANUAL TEAM SELECTOR */}
      {manualMode && (
        <div style={{ background:T.navy, borderBottom:"1px solid "+T.border, padding:"12px 16px", display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
          <div style={{ fontSize:10, color:T.muted, whiteSpace:"nowrap" }}>Away team:</div>
          <select value={manualAway} onChange={e=>setManualAway(e.target.value)} style={{ ...S.input, width:"auto", flex:1, minWidth:180 }}>
            {TEAM_NAMES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
          <div style={{ fontSize:10, color:T.muted }}>@</div>
          <div style={{ fontSize:10, color:T.muted, whiteSpace:"nowrap" }}>Home team:</div>
          <select value={manualHome} onChange={e=>setManualHome(e.target.value)} style={{ ...S.input, width:"auto", flex:1, minWidth:180 }}>
            {TEAM_NAMES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
      )}

      {/* GAME VIEW */}
      {activeGame && TEAM_PARAMS[activeGame.homeTeam] && TEAM_PARAMS[activeGame.awayTeam] ? (
        <GameSimView
          game={activeGame}
          agg={simData[gameKey]}
          running={running}
          runCount={runCounts[gameKey]||0}
          onRun={runSim}
        />
      ) : activeGame ? (
        <div style={{ textAlign:"center", padding:48, color:T.muted, fontSize:11 }}>
          Team not found in model params: {activeGame.homeTeam} vs {activeGame.awayTeam}
        </div>
      ) : (
        <div style={{ textAlign:"center", padding:48, color:T.muted, fontSize:11 }}>
          {loading ? "Loading today's games..." : "No games found. Try refreshing."}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
