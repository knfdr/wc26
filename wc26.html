// ════════════════════════════════════════════════════════════════════════════════
// LAYER 2 — DIXON-COLES MODEL
// λ_home = α_home × β_away × γ_home_advantage × μ (league mean)
// μ (mean goals international neutral) ≈ 1.22 per team per match
// γ = home/neutral advantage: ~1.0 at neutral, slight crowd effect for seeded teams
// ρ correction for low-scoring outcomes (0-0, 1-0, 0-1, 1-1) — Dixon-Coles 1997
// ════════════════════════════════════════════════════════════════════════════════
const MU = 1.22;  // grand mean goals per team per match, international neutral venue

function dixonColesLambda(attackTeam, defendTeam, isHome = false) {
  const t = TEAMS[attackTeam];
  const opp = TEAMS[defendTeam];
  const gamma = isHome ? 1.08 : 1.0; // slight "home" boost for seeded teams with big fanbases
  return t.alpha * opp.beta * gamma * MU * t.injuryFactor;
}

// Dixon-Coles ρ correction for low-score dependence
// τ(x,y,λ,μ,ρ) corrects the joint probability of (0,0), (1,0), (0,1), (1,1)
function dcTau(x, y, lambda, mu, rho) {
  if (x === 0 && y === 0) return 1 - lambda * mu * rho;
  if (x === 1 && y === 0) return 1 + mu * rho;
  if (x === 0 && y === 1) return 1 + lambda * rho;
  if (x === 1 && y === 1) return 1 - rho;
  return 1;
}
const RHO = -0.13; // Standard DC estimate for international football

// ════════════════════════════════════════════════════════════════════════════════
// LAYER 3 — xG SHOT SIMULATION
// Per-match shot distribution calibrated from national team xG data
// Each shot is assigned an individual xG drawn from Beta distribution
// Goal = Bernoulli trial on each shot's xG value
// Then DC correction applied at joint probability level
// ════════════════════════════════════════════════════════════════════════════════
function betaRandom(alpha, beta) {
  // Johnk method for Beta distribution
  let x, y;
  do {
    x = Math.pow(Math.random(), 1 / alpha);
    y = Math.pow(Math.random(), 1 / beta);
  } while (x + y > 1);
  return x / (x + y);
}

function poissonRandom(lambda) {
  const L = Math.exp(-Math.min(lambda, 30));
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

// Shot profile per team — shots/90 and shot quality (xG per shot)
// Derived from: xG/match ÷ shots/match from national team xG data
const SHOT_PROFILES = {
  Austria:    { shotsPerGame: 13.8, xgPerShot: 0.108, onTargetRate: 0.36 },
  Jordan:     { shotsPerGame: 8.5,  xgPerShot: 0.095, onTargetRate: 0.28 },
  Portugal:   { shotsPerGame: 16.2, xgPerShot: 0.118, onTargetRate: 0.40 },
  "DR Congo": { shotsPerGame: 8.8,  xgPerShot: 0.098, onTargetRate: 0.29 },
  England:    { shotsPerGame: 15.0, xgPerShot: 0.115, onTargetRate: 0.39 },
  Croatia:    { shotsPerGame: 11.5, xgPerShot: 0.103, onTargetRate: 0.33 },
  Ghana:      { shotsPerGame: 10.8, xgPerShot: 0.102, onTargetRate: 0.32 },
  Panama:     { shotsPerGame: 7.8,  xgPerShot: 0.093, onTargetRate: 0.27 },
  Uzbekistan: { shotsPerGame: 9.2,  xgPerShot: 0.098, onTargetRate: 0.29 },

};

// ════════════════════════════════════════════════════════════════════════════════
// CORNER MODEL
// Base corners/match from national team & WC 2026 data (avg 8.5/match at WC so far,
// 9.45 in UEFA qualifying). Dominant team attacking into a low block = more corners.
// ════════════════════════════════════════════════════════════════════════════════
const CORNER_PROFILES = {
  Austria:    { cFor: 5.5, cAgainst: 4.2 },
  Jordan:     { cFor: 3.8, cAgainst: 5.8 },
  Portugal:   { cFor: 6.5, cAgainst: 3.8 },
  "DR Congo": { cFor: 3.5, cAgainst: 6.0 },
  England:    { cFor: 6.2, cAgainst: 4.0 },
  Croatia:    { cFor: 4.8, cAgainst: 4.5 },
  Ghana:      { cFor: 4.5, cAgainst: 4.8 },
  Panama:     { cFor: 3.2, cAgainst: 5.5 },
  Uzbekistan: { cFor: 3.8, cAgainst: 5.2 },
  Colombia:   { cFor: 5.5, cAgainst: 4.5 },
};

function simulateCorners(homeTeam, awayTeam, hGoals, aGoals) {
  const hProf = CORNER_PROFILES[homeTeam];
  const aProf = CORNER_PROFILES[awayTeam];
  const baseH = (hProf.cFor + aProf.cAgainst) / 2;
  const baseA = (aProf.cFor + hProf.cAgainst) / 2;
  const marginEffect = Math.abs(hGoals - aGoals) * 0.25;
  const hCorners = Math.max(0, Math.round(poissonRandom(baseH + (hGoals > aGoals ? marginEffect * 0.4 : 0))));
  const aCorners = Math.max(0, Math.round(poissonRandom(baseA + (aGoals > hGoals ? marginEffect * 0.4 : 0))));
  // 1H corners: ~40% of full-match corners occur in 1H internationally
  const hC1H = Math.round(hCorners * (0.36 + Math.random() * 0.1));
  const aC1H = Math.round(aCorners * (0.36 + Math.random() * 0.1));
  return { hCorners, aCorners, hC1H, aC1H, total: hCorners + aCorners, total1H: hC1H + aC1H };
}

// ════════════════════════════════════════════════════════════════════════════════
// 1H GOAL SPLIT MODEL
// 1H goals internationally: ~42% of match goals scored before HT
// Modeled as independent Poisson draws with lambda scaled to half
// First half is slightly more conservative (teams feel each other out)
// ════════════════════════════════════════════════════════════════════════════════
function simulateHalfGoals(fullGoals, lambda) {
  // 1H lambda is not simply half of full-match lambda:
  // empirically ~40% of intl goals fall in 1H (teams cautious early)
  const h1Lambda = lambda * 0.40;
  const h1Goals = Math.min(fullGoals, poissonRandom(h1Lambda));
  const h2Goals = fullGoals - h1Goals;
  return { h1Goals, h2Goals };
}

function simulateGoalsViaShots(teamName, lambda) {
  // Simulate shot-by-shot: number of shots from Poisson(shotRate)
  // Each shot: xG drawn from Beta, then Bernoulli trial
  // Cap goals at a natural distribution ceiling
  const profile = SHOT_PROFILES[teamName];
  const nShots = Math.max(0, Math.round(poissonRandom(profile.shotsPerGame) + (Math.random() * 3 - 1.5)));
  let goals = 0;
  let shotsOnTarget = 0;
  let totalXG = 0;

  for (let i = 0; i < nShots; i++) {
    // Shot quality: Beta(2, 14) gives realistic right-skewed xG distribution
    // Shift mean toward team's average xgPerShot
    const xgShot = clamp(betaRandom(2, 14) * (profile.xgPerShot / (2 / (2 + 14))), 0.01, 0.85);
    totalXG += xgShot;
    if (Math.random() < profile.onTargetRate) shotsOnTarget++;
    if (Math.random() < xgShot) goals++;
  }

  // Soft-constrain toward DC lambda (blend shot sim with DC expectation)
  // This is the key integration: shot sim anchored to DC team strength
  const blendedGoals = Math.round(goals * 0.65 + poissonRandom(lambda) * 0.35);
  return { goals: Math.max(0, blendedGoals), shots: nShots, shotsOnTarget, totalXG };
}

// ════════════════════════════════════════════════════════════════════════════════
// LAYER 4 — CARD MODEL
// Negative binomial model for yellow cards (overdispersed relative to Poisson)
// Red cards: conditional on yellow pressure + match state
// ════════════════════════════════════════════════════════════════════════════════
function negBinRandom(r, p) {
  // NegBin via Poisson-Gamma mixture: more realistic than pure Poisson for cards
  const gamma_rate = r * (1 - p) / p;
  const lambda = -gamma_rate * Math.log(Math.random());
  return poissonRandom(lambda);
}

function simulateCards(teamName, isUnderdog, goalDeficit) {
  const baseYellow = {
    Austria: 1.78, Jordan: 2.12, Portugal: 1.65, "DR Congo": 1.95,
    England: 1.58, Croatia: 1.98, Ghana: 2.05, Panama: 2.18,
    Uzbekistan: 2.08, Colombia: 2.02,
  }[teamName] || 1.7;

  // Pressure multiplier: losing teams collect more yellows
  const pressureMult = 1 + Math.max(0, goalDeficit) * 0.09;
  const underdogMult = isUnderdog ? 1.12 : 1.0;

  // NegBin(r=3, p adjusted to hit target mean)
  const targetMean = baseYellow * pressureMult * underdogMult;
  const r = 3; const p = r / (r + targetMean);
  const yellows = negBinRandom(r, p);

  // Red card: base rate + escalation for repeated fouls + scoreline pressure
  const baseRedRate = {
    Austria: 0.040, Jordan: 0.062, Portugal: 0.032, "DR Congo": 0.058,
    England: 0.034, Croatia: 0.050, Ghana: 0.055, Panama: 0.065,
    Uzbekistan: 0.060, Colombia: 0.048,
  }[teamName] || 0.05;
  const redRate = clamp(baseRedRate + (goalDeficit > 2 ? 0.05 : 0) + (yellows > 3 ? 0.04 : 0), 0, 0.35);
  const reds = Math.random() < redRate ? 1 : 0;

  return { yellows, reds };
}

// ════════════════════════════════════════════════════════════════════════════════
// SIMULATION ENGINE — Full pipeline:
// DC lambdas → Shot-level xG sim → DC ρ correction → Card NegBin model
// ════════════════════════════════════════════════════════════════════════════════
function runSimulation(match, n = 100000) {
  const { homeTeam, awayTeam, homeIsSeeded } = match;
  const homeLambda = dixonColesLambda(homeTeam, awayTeam, homeIsSeeded);
  const awayLambda = dixonColesLambda(awayTeam, homeTeam, false);

  const results = [];

  for (let i = 0; i < n; i++) {
    // LAYER 3: xG shot simulation blended with DC lambda
    const homeSim = simulateGoalsViaShots(homeTeam, homeLambda);
    const awaySim = simulateGoalsViaShots(awayTeam, awayLambda);

    let hG = homeSim.goals;
    let aG = awaySim.goals;

    // LAYER 2: Dixon-Coles ρ low-score correction
    // For low-scoring outcomes, apply DC tau correction as acceptance probability
    if (hG <= 1 && aG <= 1) {
      const tau = dcTau(hG, aG, homeLambda, awayLambda, RHO);
      // Rejection sampling: if tau < 1, occasionally reject and re-draw
      if (tau < 1 && Math.random() > tau) {
        // Nudge: slight redistribution toward 0-0
        hG = Math.random() < 0.5 ? 0 : hG;
        aG = Math.random() < 0.5 ? 0 : aG;
      }
    }

    const deficit_h = aG - hG;
    const deficit_a = hG - aG;
    const homeIsUnderdog = TEAMS[homeTeam].alpha < TEAMS[awayTeam].alpha;

    // LAYER 4: Card model
    const homeCards = simulateCards(homeTeam, homeIsUnderdog, deficit_h);
    const awayCards = simulateCards(awayTeam, !homeIsUnderdog, deficit_a);

    // 1H goal splits
    const homeHalf = simulateHalfGoals(hG, homeLambda);
    const awayHalf = simulateHalfGoals(aG, awayLambda);
    const h1G = homeHalf.h1Goals;
    const a1G = awayHalf.h1Goals;
    const ht_winner = h1G > a1G ? "home" : a1G > h1G ? "away" : "draw";

    // Corner model
    const corners = simulateCorners(homeTeam, awayTeam, hG, aG);

    const winner = hG > aG ? "home" : aG > hG ? "away" : "draw";

    results.push({
      hG, aG, winner,
      h1G, a1G, ht_winner,
      hY: homeCards.yellows, aY: awayCards.yellows,
      hR: homeCards.reds,    aR: awayCards.reds,
      hShots: homeSim.shots, aShots: awaySim.shots,
      hSOT: homeSim.shotsOnTarget, aSOT: awaySim.shotsOnTarget,
      hXG: +homeSim.totalXG.toFixed(2), aXG: +awaySim.totalXG.toFixed(2),
      total: hG + aG,
      total1H: h1G + a1G,
      hCorners: corners.hCorners, aCorners: corners.aCorners,
      totalCorners: corners.total,
      hC1H: corners.hC1H, aC1H: corners.aC1H, totalC1H: corners.total1H,
    });
  }

  return results;
}

function aggregate(match, results) {
  const n = results.length;
  const hW = results.filter(r => r.winner === "home").length;
  const aW = results.filter(r => r.winner === "away").length;
  const dW = results.filter(r => r.winner === "draw").length;
  const avg = arr => (arr.reduce((a, b) => a + b, 0) / arr.length);
  const fmt = (v, d=2) => v.toFixed(d);

  const scorelines = results.map(r => `${r.hG}-${r.aG}`);
  const freq = {};
  scorelines.forEach(s => freq[s] = (freq[s] || 0) + 1);
  const topScores = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 8)
    .map(([score, count]) => ({ score, count, pct: ((count / n) * 100).toFixed(1) }));
  const [mls, mlsCount] = Object.entries(freq).sort((a, b) => b[1] - a[1])[0];

  const line = match.overUnderLine;
  const over  = results.filter(r => r.total > line).length;
  const under = results.filter(r => r.total < line).length;
  const btts  = results.filter(r => r.hG > 0 && r.aG > 0).length;
  const cs    = results.filter(r => r.aG === 0).length;
  const anyRed = results.filter(r => r.hR > 0 || r.aR > 0).length;
  const hReds  = results.filter(r => r.hR > 0).length;
  const aReds  = results.filter(r => r.aR > 0).length;

  // xG averages
  const avgHXG = avg(results.map(r => r.hXG));
  const avgAXG = avg(results.map(r => r.aXG));

  // 1H outcomes
  const ht_hW = results.filter(r => r.ht_winner === "home").length;
  const ht_aW = results.filter(r => r.ht_winner === "away").length;
  const ht_dW = results.filter(r => r.ht_winner === "draw").length;
  const avg1HTotal = avg(results.map(r => r.total1H));
  const h1Over05  = results.filter(r => r.total1H > 0.5).length;
  const h1Over15  = results.filter(r => r.total1H > 1.5).length;
  const h1Over25  = results.filter(r => r.total1H > 2.5).length;
  const hSpread1H = results.filter(r => r.h1G > r.a1G).length; // home covers 1H spread

  // Corner aggregates
  const avgHC  = avg(results.map(r => r.hCorners));
  const avgAC  = avg(results.map(r => r.aCorners));
  const avgTC  = avg(results.map(r => r.totalCorners));
  const avgHC1H = avg(results.map(r => r.hC1H));
  const avgAC1H = avg(results.map(r => r.aC1H));
  const avgTC1H = avg(results.map(r => r.totalC1H));
  const cOver85  = results.filter(r => r.totalCorners > 8.5).length;
  const cOver95  = results.filter(r => r.totalCorners > 9.5).length;
  const cOver105 = results.filter(r => r.totalCorners > 10.5).length;
  const cOver115 = results.filter(r => r.totalCorners > 11.5).length;
  const c1HOver35 = results.filter(r => r.totalC1H > 3.5).length;
  const c1HOver45 = results.filter(r => r.totalC1H > 4.5).length;
  const hCornersWin = results.filter(r => r.hCorners > r.aCorners).length;

  // DC lambdas for display
  const homeLambda = dixonColesLambda(match.homeTeam, match.awayTeam, match.homeIsSeeded);
  const awayLambda = dixonColesLambda(match.awayTeam, match.homeTeam, false);

  return {
    n, hW, aW, dW,
    hWPct: fmt((hW/n)*100,1), aWPct: fmt((aW/n)*100,1), dWPct: fmt((dW/n)*100,1),
    mls, mlsPct: fmt((mlsCount/n)*100,1),
    avgHG: fmt(avg(results.map(r=>r.hG))), avgAG: fmt(avg(results.map(r=>r.aG))),
    avgTotal: fmt(avg(results.map(r=>r.total))),
    avgHY: fmt(avg(results.map(r=>r.hY))), avgAY: fmt(avg(results.map(r=>r.aY))),
    avgHShots: fmt(avg(results.map(r=>r.hShots))), avgAShots: fmt(avg(results.map(r=>r.aShots))),
    avgHSOT: fmt(avg(results.map(r=>r.hSOT))), avgASOT: fmt(avg(results.map(r=>r.aSOT))),
    avgHXG: fmt(avgHXG), avgAXG: fmt(avgAXG),
    overPct: fmt((over/n)*100,1), underPct: fmt((under/n)*100,1),
    bttsPct: fmt((btts/n)*100,1), csPct: fmt((cs/n)*100,1),
    anyRedPct: fmt((anyRed/n)*100,1),
    hRedPct: fmt((hReds/n)*100,1), aRedPct: fmt((aReds/n)*100,1),
    topScores,
    homeLambda: fmt(homeLambda), awayLambda: fmt(awayLambda),
    // 1H
    ht_hWPct: fmt((ht_hW/n)*100,1), ht_aWPct: fmt((ht_aW/n)*100,1), ht_dWPct: fmt((ht_dW/n)*100,1),
    avg1HTotal: fmt(avg1HTotal),
    h1Over05Pct: fmt((h1Over05/n)*100,1),
    h1Over15Pct: fmt((h1Over15/n)*100,1),
    h1Over25Pct: fmt((h1Over25/n)*100,1),
    hSpread1HPct: fmt((hSpread1H/n)*100,1),
    // Corners
    avgHC: fmt(avgHC,1), avgAC: fmt(avgAC,1), avgTC: fmt(avgTC,1),
    avgHC1H: fmt(avgHC1H,1), avgAC1H: fmt(avgAC1H,1), avgTC1H: fmt(avgTC1H,1),
    cOver85Pct:  fmt((cOver85/n)*100,1),
    cOver95Pct:  fmt((cOver95/n)*100,1),
    cOver105Pct: fmt((cOver105/n)*100,1),
    cOver115Pct: fmt((cOver115/n)*100,1),
    c1HOver35Pct: fmt((c1HOver35/n)*100,1),
    c1HOver45Pct: fmt((c1HOver45/n)*100,1),
    hCornersWinPct: fmt((hCornersWin/n)*100,1),
  };
}

// PARLAY ENGINE
// Extracts qualifying legs from every match's aggregate output:
//   LEAN  — sim prob materially exceeds implied book prob (same as match tab)
//   HIGH  — sim prob >= 70% regardless of book edge (very likely outcomes)
//   LOCK  — sim prob >= 85% (near-certainties, anchor legs)
// Enumerates all 2/3/4/5-leg cross-match combinations sorted by joint probability.
// ════════════════════════════════════════════════════════════════════════════════

function extractLegs(matchId, agg, homeTeam, awayTeam) {
  if (!agg) return [];
  const legs = [];
  const matchLabel = homeTeam + " vs " + awayTeam;

  const push = (market, prob, bookOdds, tier) => {
    const p = parseFloat(prob) / 100;
    if (p > 0) legs.push({ matchId, match: matchLabel, market, prob: p, probPct: prob, bookOdds, tier });
  };

  // ── Full-match ────────────────────────────────────────────────────────────
  const hWin  = parseFloat(agg.hWPct);
  const aWin  = parseFloat(agg.aWPct);
  const overP = parseFloat(agg.overPct);
  const underP= parseFloat(agg.underPct);
  const csP   = parseFloat(agg.csPct);
  const bttsP = parseFloat(agg.bttsPct);

  // LOCK / HIGH: very high raw probability
  if (hWin  >= 85) push(homeTeam + " Win",          agg.hWPct,  "ML",        "LOCK");
  else if (hWin >= 70) push(homeTeam + " Win",       agg.hWPct,  "ML",        "HIGH");
  else if (hWin >  52) push(homeTeam + " Win",       agg.hWPct,  "ML",        "LEAN");
  else if (hWin >  45) push(homeTeam + " Win",       agg.hWPct,  "ML",        "CONSIDER");

  if (aWin  >= 70) push(awayTeam + " Win",           agg.aWPct,  "ML",        "HIGH");
  else if (aWin > 30) push(awayTeam + " Win",        agg.aWPct,  "ML",        "LEAN");

  if (overP >= 85) push("Over Goals",                agg.overPct,"O/U Over",  "LOCK");
  else if (overP >= 70) push("Over Goals",           agg.overPct,"O/U Over",  "HIGH");
  else if (overP >  52) push("Over Goals",           agg.overPct,"O/U Over",  "LEAN");
  else if (overP >  45) push("Over Goals",           agg.overPct,"O/U Over",  "CONSIDER");

  if (underP >= 85) push("Under Goals",              agg.underPct,"O/U Under","LOCK");
  else if (underP >= 70) push("Under Goals",         agg.underPct,"O/U Under","HIGH");
  else if (underP >  55) push("Under Goals",         agg.underPct,"O/U Under","LEAN");
  else if (underP >  45) push("Under Goals",         agg.underPct,"O/U Under","CONSIDER");

  if (csP >= 70) push(homeTeam + " Clean Sheet",     agg.csPct,  "CS",        "HIGH");
  else if (csP > 50) push(homeTeam + " Clean Sheet", agg.csPct,  "CS",        "LEAN");
  else if (csP > 40) push(homeTeam + " Clean Sheet", agg.csPct,  "CS",        "CONSIDER");

  if (bttsP >= 70) push("Both Teams Score",          agg.bttsPct,"BTTS",      "HIGH");
  else if (bttsP > 52) push("Both Teams Score",      agg.bttsPct,"BTTS",      "LEAN");
  else if (bttsP > 45) push("Both Teams Score",      agg.bttsPct,"BTTS",      "CONSIDER");

  // ── 1H markets ───────────────────────────────────────────────────────────
  const ht_hW = parseFloat(agg.ht_hWPct);
  const ht_dW = parseFloat(agg.ht_dWPct);
  const h1o05 = parseFloat(agg.h1Over05Pct);
  const h1o15 = parseFloat(agg.h1Over15Pct);
  const hSp   = parseFloat(agg.hSpread1HPct);

  if (ht_hW >= 70) push(homeTeam + " HT Win",        agg.ht_hWPct,"HT 1X2",  "HIGH");
  else if (ht_hW > 45) push(homeTeam + " HT Win",    agg.ht_hWPct,"HT 1X2",  "LEAN");

  if (ht_dW >= 70) push("HT Draw",                   agg.ht_dWPct,"HT 1X2",  "HIGH");
  else if (ht_dW > 45) push("HT Draw",               agg.ht_dWPct,"HT 1X2",  "LEAN");

  if (h1o05 >= 85) push("1H Over 0.5 Goals",         agg.h1Over05Pct,"1H O/U","LOCK");
  else if (h1o05 >= 70) push("1H Over 0.5 Goals",    agg.h1Over05Pct,"1H O/U","HIGH");
  else if (h1o05 >  65) push("1H Over 0.5 Goals",    agg.h1Over05Pct,"1H O/U","LEAN");

  if (h1o15 >= 70) push("1H Over 1.5 Goals",         agg.h1Over15Pct,"1H O/U","HIGH");

  if (hSp >= 70) push(homeTeam + " 1H -0.5 Spread",  agg.hSpread1HPct,"1H Sprd","HIGH");
  else if (hSp > 52) push(homeTeam + " 1H -0.5 Spread",agg.hSpread1HPct,"1H Sprd","LEAN");

  // ── Corners ───────────────────────────────────────────────────────────────
  const c85   = parseFloat(agg.cOver85Pct);
  const c95   = parseFloat(agg.cOver95Pct);
  const hCW   = parseFloat(agg.hCornersWinPct);
  const c1h35 = parseFloat(agg.c1HOver35Pct);

  if (c85 >= 85) push("Over 8.5 Corners",            agg.cOver85Pct, "Corners","LOCK");
  else if (c85 >= 70) push("Over 8.5 Corners",       agg.cOver85Pct, "Corners","HIGH");
  else if (c85 >  55) push("Over 8.5 Corners",       agg.cOver85Pct, "Corners","LEAN");

  if (c95 >= 70) push("Over 9.5 Corners",            agg.cOver95Pct, "Corners","HIGH");
  else if (c95 > 50) push("Over 9.5 Corners",        agg.cOver95Pct, "Corners","LEAN");

  if (hCW >= 70) push(homeTeam + " Most Corners",    agg.hCornersWinPct,"Corners","HIGH");
  else if (hCW > 55) push(homeTeam + " Most Corners",agg.hCornersWinPct,"Corners","LEAN");

  if (c1h35 >= 70) push("1H Over 3.5 Corners",       agg.c1HOver35Pct,"1H Crn","HIGH");
  else if (c1h35 > 55) push("1H Over 3.5 Corners",   agg.c1HOver35Pct,"1H Crn","LEAN");

  return legs;
}

function buildCombinations(legs, size) {
  const results = [];
  function combine(start, current) {
    if (current.length === size) {
      results.push([...current]);
      return;
    }
    for (let i = start; i < legs.length; i++) {
      // Enforce: no two legs from the same match (correlated — bad parlay practice)
      const matchIds = current.map(l => l.matchId);
      if (!matchIds.includes(legs[i].matchId)) {
        current.push(legs[i]);
        combine(i + 1, current);
        current.pop();
      }
    }
  }
  combine(0, []);
  return results;
}

// Unit sizing: LOCK=2u, HIGH=1.5u, LEAN=1u, CONSIDER=0.5u
function tierToUnits(tier) {
  if (tier === "LOCK") return 2.0;
  if (tier === "HIGH") return 1.5;
  if (tier === "CONSIDER") return 0.5;
  return 1.0;
}

function tierColor(tier, T) {
  if (tier === "LOCK") return T.red;

}

// ── Gist read/write ──────────────────────────────────────────────────────────
async function gistRead(ghToken) {
  const res = await fetch("https://api.github.com/gists/" + GIST_ID, {
    headers: { Authorization: "token " + ghToken, Accept: "application/vnd.github.v3+json" }
  });
  if (!res.ok) throw new Error("Gist read failed: " + res.status);
  const data = await res.json();
  const content = data.files[GIST_FILENAME] && data.files[GIST_FILENAME].content;
  try { return JSON.parse(content || "[]"); } catch { return []; }
}

async function gistWrite(ghToken, bets) {
  const res = await fetch("https://api.github.com/gists/" + GIST_ID, {
    method: "PATCH",
    headers: { Authorization: "token " + ghToken, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(bets, null, 2) } } })
  });
  if (!res.ok) throw new Error("Gist write failed: " + res.status);
  return true;
}

// ── Auto-resolve via Odds API scores ─────────────────────────────────────────
const SCORES_CACHE_TTL = 30 * 60 * 1000;
async function fetchScores(sportKey, oddsKey) {
  const cacheKey = "sharp_scores_cache_" + sportKey;
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
    if (cached && Date.now() - cached.ts < SCORES_CACHE_TTL) return cached.data;
  } catch(e) {}
  const res = await fetch(
    "https://api.the-odds-api.com/v4/sports/" + sportKey + "/scores/?daysFrom=4&apiKey=" + oddsKey
  );
  if (!res.ok) throw new Error("scores API error: " + res.status);
  const data = await res.json();
  localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data }));
  return data;
}

async function autoResolveBets(bets, oddsKey) {
  const pending = bets.filter(b => b.result === "pending");
  if (!pending.length || !oddsKey) return bets;

  const sports = [...new Set(pending.map(b => b.sport))];
  const scoreMap = {};

  for (const sport of sports) {
    const sportKey = sport === "MLB" ? "baseball_mlb" : "soccer_fifa_world_cup";
    try {
      const scores = await fetchScores(sportKey, oddsKey);
      console.log("[resolve] sport=" + sport + " raw scores count=" + scores.length);
      scores.forEach(g => {
        if (g.completed !== true || !g.scores || !g.scores.length) return;
        const commenceTime = new Date(g.commence_time).getTime();
        const threeHoursMs = 3 * 60 * 60 * 1000;
        if (Date.now() - commenceTime < threeHoursMs) return;
        const normName = n => n
          .replace("Congo DR", "DR Congo")
          .replace("Curaçao", "Curacao");
        const h = normName(g.home_team);
        const a = normName(g.away_team);
        scoreMap[g.id] = g;
        scoreMap[h + "|" + a] = g;
        scoreMap[a + "|" + h] = g;
        console.log("[resolve] scoreMap ADDED " + h + " vs " + a + " id=" + g.id);
      });
    } catch(e) { console.error("[resolve] fetch error", e); }
  }

  console.log("[resolve] scoreMap keys:", Object.keys(scoreMap));

  return bets.map(bet => {
    if (bet.result !== "pending") return bet;
    const game = scoreMap[bet.gameId] || scoreMap[bet.homeTeam + "|" + bet.awayTeam];
    console.log("[resolve] bet=" + bet.market + " home=" + bet.homeTeam + " away=" + bet.awayTeam + " gameId=" + bet.gameId + " => found=" + !!game);
    if (!game || game.completed !== true) return bet;
    // For MLB only: verify game date matches bet date to prevent same-series cross-day false matches
    // WC teams play every 3+ days so cross-day false matches can't occur there
    if (bet.sport === "MLB" && bet.gameDate && new Date(game.commence_time).toISOString().slice(0,10) !== bet.gameDate) return bet;

    const homeScore = parseInt((game.scores.find(s => s.name === game.home_team) || {}).score || "0");
    const awayScore = parseInt((game.scores.find(s => s.name !== game.home_team) || {}).score || "0");

    let result = "loss";
    const market = bet.market.toLowerCase();

    if (market.includes("ml") || market.includes("win")) {
      const pickedHome = bet.market.includes(game.home_team);
      if (pickedHome && homeScore > awayScore) result = "win";
      else if (!pickedHome && awayScore > homeScore) result = "win";
      // draws are a push for MLB ML but a loss for soccer Win bets
      else if (homeScore === awayScore && bet.sport === "MLB") result = "push";
    } else if (market.includes("over")) {
      const line = parseFloat(bet.market.match(/[\d.]+/) || [0]);
      if (homeScore + awayScore > line) result = "win";
      else if (homeScore + awayScore === line) result = "push";
    } else if (market.includes("under")) {
      const line = parseFloat(bet.market.match(/[\d.]+/) || [0]);
      if (homeScore + awayScore < line) result = "win";
      else if (homeScore + awayScore === line) result = "push";
    } else if (market.includes("nrfi")) {
      if (homeScore === 0 && awayScore === 0) result = "win";
    } else if (market.includes("yrfi")) {
      if (homeScore > 0 || awayScore > 0) result = "win";
    } else if (market.includes("-1.5") || market.includes("run line")) {
      const pickedHome = bet.market.includes(game.home_team);
      if (pickedHome && (homeScore - awayScore) >= 2) result = "win";
      else if (!pickedHome && (awayScore - homeScore) >= 2) result = "win";
    }

    return { ...bet, result, resolvedAt: new Date().toISOString(), finalScore: homeScore + "-" + awayScore };
  });
}

// ── Stats calculator ──────────────────────────────────────────────────────────
function calcStats(bets) {
  const resolved = bets.filter(b => b.result !== "pending");
  const wins = resolved.filter(b => b.result === "win");
  const losses = resolved.filter(b => b.result === "loss");
  const pushes = resolved.filter(b => b.result === "push");
  const totalUnits = resolved.reduce((a, b) => a + (b.result === "win" ? b.units : b.result === "loss" ? -b.units : 0), 0);

  const bySport = {};
  resolved.forEach(b => {
    if (!bySport[b.sport]) bySport[b.sport] = { wins:0, losses:0, pushes:0, units:0 };
    bySport[b.sport].units += b.result === "win" ? b.units : b.result === "loss" ? -b.units : 0;
    if (b.result === "win") bySport[b.sport].wins++;
    else if (b.result === "loss") bySport[b.sport].losses++;
    else bySport[b.sport].pushes++;
  });

  return {
    total: resolved.length, wins: wins.length, losses: losses.length, pushes: pushes.length,
    winPct: resolved.length ? ((wins.length / (resolved.length - pushes.length)) * 100).toFixed(1) : "—",
    totalUnits: totalUnits.toFixed(1),
    pending: bets.filter(b => b.result === "pending").length,
    bySport,
  };
}

// ── Extract top bets from sim agg ─────────────────────────────────────────────
function extractTopBets(agg, game, sport) {
  const bets = [];
  const gameId = game ? game.id : (agg.homeTeam + "|" + agg.awayTeam);
  const homeTeam = agg.homeTeam || game.homeTeam;
  const awayTeam = agg.awayTeam || game.awayTeam;

  function push(market, simPct, bookOdds, tier) {
    bets.push({
      id: Date.now() + "_" + Math.random().toString(36).slice(2,7),
      sport, gameId,
      homeTeam, awayTeam,
      market, simPct, bookOdds,
      tier, units: tierToUnits(tier),
      loggedAt: new Date().toISOString(),
      result: "pending",
      resolvedAt: null, finalScore: null,
      gameDate: new Date().toISOString().slice(0,10),
    });
  }

  if (sport === "MLB" && agg) {
    const hasOdds = game && game.h2h && game.h2h.home;
    const hImp = hasOdds ? impliedProb(game.h2h.home) : 0;
    const aImp = hasOdds ? impliedProb(game.h2h.away) : 0;

    const checks = [
      { market: homeTeam+" ML", pct: parseFloat(agg.hWPct), imp: hImp, odds: hasOdds?fmtOdds(game.h2h.home):"—" },
      { market: awayTeam+" ML", pct: parseFloat(agg.aWPct), imp: aImp, odds: hasOdds?fmtOdds(game.h2h.away):"—" },
      { market: "Over 8.5 Total", pct: parseFloat(agg.over85Pct), imp: 0, odds: hasOdds?fmtOdds(game.total.overPrice):"—" },
      { market: "Under 8.5 Total", pct: parseFloat(agg.under85Pct), imp: 0, odds: hasOdds?fmtOdds(game.total.underPrice):"—" },
      { market: "F5 Over 3.5", pct: parseFloat(agg.f5Over35Pct), imp: 0, odds:"~-110" },
      { market: homeTeam+" F5 Win", pct: parseFloat(agg.f5HomePct), imp: hImp*0.9, odds:"~F5 ML" },
      { market: awayTeam+" F5 Win", pct: parseFloat(agg.f5AwayPct), imp: aImp*0.9, odds:"~F5 ML" },
      { market: "NRFI", pct: parseFloat(agg.nrfiPct), imp: 0, odds:"~-120" },
      { market: "YRFI", pct: parseFloat(agg.yrfiPct), imp: 0, odds:"~-105" },
    ];

    checks.forEach(({ market, pct, imp, odds }) => {
      if (pct >= 70) push(market, pct.toFixed(1)+"%", odds, "LOCK");
      else if (pct >= 60) push(market, pct.toFixed(1)+"%", odds, "HIGH");
      else if (pct > 52 && pct > imp + 3) push(market, pct.toFixed(1)+"%", odds, "LEAN");
    });
  }

  if (sport === "WC" && agg) {
    const checks = [
      { market: homeTeam+" Win", pct: parseFloat(agg.hWPct), odds: "ML" },
      { market: awayTeam+" Win", pct: parseFloat(agg.aWPct), odds: "ML" },
      { market: "Over "+agg.overUnderLine+" Goals", pct: parseFloat(agg.overPct), odds: agg.overOdds||"—" },
      { market: "Under "+agg.overUnderLine+" Goals", pct: parseFloat(agg.underPct), odds: agg.underOdds||"—" },
      { market: homeTeam+" Clean Sheet", pct: parseFloat(agg.csPct), odds:"~Market" },
      { market: "1H Over 0.5 Goals", pct: parseFloat(agg.h1Over05Pct), odds:"~-180" },
      { market: homeTeam+" HT Win", pct: parseFloat(agg.ht_hWPct), odds:"~HT 1X2" },
      { market: "Over 8.5 Corners", pct: parseFloat(agg.cOver85Pct), odds:"~-115" },
      { market: homeTeam+" 1H -0.5 Spread", pct: parseFloat(agg.hSpread1HPct), odds:"~-120" },
    ];
    checks.forEach(({ market, pct, odds }) => {
      if (pct >= 85) push(market, pct.toFixed(1)+"%", odds, "LOCK");
      else if (pct >= 70) push(market, pct.toFixed(1)+"%", odds, "HIGH");
      else if (pct > 52) push(market, pct.toFixed(1)+"%", odds, "LEAN");
      else if (pct > 45) push(market, pct.toFixed(1)+"%", odds, "CONSIDER");
    });
  }

  // Sort by simPct desc, then dedupe by market
  return bets.sort((a,b) => parseFloat(b.simPct) - parseFloat(a.simPct));
}

function impliedProb(ml) {
  if (!ml) return 0;
  return ml < 0 ? (-ml)/(-ml+100)*100 : 100/(ml+100)*100;
}
function fmtOdds(n) {
  if (!n && n!==0) return "—";
  return n > 0 ? "+"+n : ""+n;
}

// Bet Logger Hook — manages gist read/write and local state
function useBetLogger(ghToken, oddsKey) {
  const [bets, setBets] = useState([]);
  const [saving, setSaving] = useState(false);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    if (!ghToken) return;
    gistRead(ghToken).then(data => {
      if (oddsKey) {
        autoResolveBets(data, oddsKey).then(resolved => {
          setBets(resolved);
          setLoaded(true);
          if (resolved.some((b,i) => b.result !== data[i]?.result)) {
            gistWrite(ghToken, resolved).catch(console.error);
          }
        });
      } else {
        setBets(data);
        setLoaded(true);
      }
    }).catch(e => {
      console.error("Gist read error:", e);
      setLoaded(true);
    });
  }, [ghToken]);

  async function logBet(bet) {
    if (!ghToken) return;
    setSaving(true);
    const updated = [...bets, bet];
    setBets(updated);
    try { await gistWrite(ghToken, updated); } catch(e) { console.error(e); }
    setSaving(false);
  }

  async function logAllBets(newBets) {
    if (!ghToken || !newBets.length) return;
    setSaving(true);
    const today = new Date().toISOString().slice(0,10);
    const existingKeys = new Set(
      bets
        .filter(b => b.gameDate === today)
        .map(b => b.gameId + "|" + b.market)
    );
    const toAdd = newBets.filter(b => !existingKeys.has(b.gameId + "|" + b.market));
    if (!toAdd.length) { setSaving(false); return; }
    const updated = [...bets, ...toAdd];
    setBets(updated);
    try { await gistWrite(ghToken, updated); } catch(e) { console.error(e); }
    setSaving(false);
  }

  async function removeBet(id) {
    if (!ghToken) return;
    const updated = bets.filter(b => b.id !== id);
    setBets(updated);
    try { await gistWrite(ghToken, updated); } catch(e) { console.error(e); }
  }

  const stats = calcStats(bets);
  const today = new Date().toISOString().slice(0,10);
  const isLogged = (gameId, market) =>
    bets.some(b => b.gameId === gameId && b.market === market && b.gameDate === today && b.result === "pending");

  return { bets, stats, logBet, logAllBets, removeBet, saving, loaded, isLogged };
}

function buildParlays(simData) {
  const allLegs = [];
  MATCHES.forEach(m => {
    const agg = simData[m.id];
    if (!agg) return;
    const legs = extractLegs(m.id, agg, m.homeTeam, m.awayTeam);
    allLegs.push(...legs);
  });
  if (allLegs.length === 0) return { legs: allLegs, parlays: [] };
  const parlays = [];
  for (const size of [2, 3, 4, 5]) {
    const combos = buildCombinations(allLegs, size);
    combos.forEach(combo => {
      const jp = combo.reduce((acc, leg) => acc * leg.prob, 1);
      parlays.push({ legs: combo, size, jointProb: jp, jointProbPct: (jp * 100).toFixed(2) });
    });
  }
  parlays.sort((a, b) => b.jointProb - a.jointProb);
  return { legs: allLegs, parlays: parlays.slice(0, 40) };
}

              <div><div style={{ fontSize:9, color:T.muted }}>LEGS</div><div style={{ fontSize:13, fontWeight:700, color:T.purple }}>{parlay.size}</div></div>
            </div>
          </div>
        );
      })}
      <div style={{ ...S.disclaimer, marginTop:20 }}>
        Parlay legs assumed independent across matches. Correlated same-match legs excluded by design. Fair odds shown before bookmaker vig (~10-15%). Not professional betting advice. Gamble responsibly.
      </div>
    </div>
  );
}

// MAIN APP — auto-runs all 4 sims sequentially on first load
// ════════════════════════════════════════════════════════════════════════════════
// ── WC Top Picks Tab ─────────────────────────────────────────────────────────
function WCTopPicksTab({ simData, betLogger }) {
  const { logAllBets, isLogged, stats, saving } = betLogger;

  const allBets = [];
  MATCHES.forEach(m => {
    const agg = simData[m.id];
    if (!agg) return;
    const gameObj = { id: m.id, homeTeam: m.homeTeam, awayTeam: m.awayTeam,
      overUnderLine: m.overUnderLine, overOdds: m.overOdds, underOdds: m.underOdds };
    extractTopBets({ ...agg, overUnderLine: m.overUnderLine, overOdds: m.overOdds, underOdds: m.underOdds }, gameObj, "WC")
      .forEach(b => allBets.push(b));
  });
  allBets.sort((a,b) => parseFloat(b.simPct)-parseFloat(a.simPct));

  const simsReady = MATCHES.filter(m => simData[m.id]).length;
  const allSimsReady = simsReady === MATCHES.length;

  const locks = allBets.filter(b=>b.tier==="LOCK");
  const highs = allBets.filter(b=>b.tier==="HIGH");
  const leans = allBets.filter(b=>b.tier==="LEAN");
  const considers = allBets.filter(b=>b.tier==="CONSIDER");
  const loggedCount = allBets.filter(b => isLogged(b.gameId, b.market)).length;

  return (
    <div style={{ maxWidth:900, margin:"0 auto", padding:"0 14px 48px" }}>
      <div style={S.sec}>
        <StatsBanner stats={stats} T={T} S={S}/>
        <div style={{ ...S.card, background:"#0a1020", border:"1px solid "+T.gold+"33", marginBottom:14 }}>
          <div style={{ fontSize:11, color:T.gold, fontWeight:700, letterSpacing:"1px" }}>TOP PICKS — JUNE 17, 2026</div>
          <div style={{ fontSize:10, color:T.muted, marginTop:3 }}>
            {simsReady}/{MATCHES.length} matches simulated · {allBets.length} qualifying signals
            {saving ? " · Saving to Gist..." : allSimsReady && loggedCount > 0 ? " · "+loggedCount+" auto-logged ✓" : ""}
          </div>
        </div>
      </div>
      {[{label:"LOCK Bets",bets:locks},{label:"HIGH Confidence",bets:highs},{label:"LEAN Signals",bets:leans},{label:"CONSIDER (0.5u)",bets:considers}]
        .map(({label,bets}) => bets.length > 0 && (
          <div key={label} style={S.sec}>
            <div style={S.secLabel}>{label} ({bets.length})</div>
            {bets.map((bet,i) => (
              <TopBetCard key={i} bet={bet} T={T} S={S} logged={isLogged(bet.gameId, bet.market)}/>
            ))}
          </div>
        ))}
      {allBets.length===0 && simsReady>0 && <div style={{ ...S.card, textAlign:"center", padding:32, color:T.muted, marginTop:20 }}>No qualifying signals found.</div>}
      <div style={S.sec}>
        <div style={S.secLabel}>Bet Log — WC 2026 ({betLogger.bets.filter(b=>b.sport==="WC").length} bets)</div>
        {betLogger.bets.filter(b=>b.sport==="WC").length===0
          ? <div style={{ ...S.card, color:T.muted, fontSize:10, textAlign:"center", padding:24 }}>Bets will auto-log once all match sims complete.</div>
          : <div style={S.card}>
              <div style={{ ...S.betRow, fontSize:"8px", fontWeight:700 }}>
                <span style={{ minWidth:120, color:T.muted }}>DATE</span>
                <span style={{ flex:2, color:T.muted }}>MARKET</span>
                <span style={{ flex:1, color:T.muted }}>MATCHUP</span>
                <span style={{ color:T.muted }}>TIER</span>
                <span style={{ color:T.muted }}>SIM %</span>
                <span style={{ minWidth:50, textAlign:"right", color:T.muted }}>RESULT</span>
              </div>
              {betLogger.bets.filter(b=>b.sport==="WC").slice().reverse().map(b=>(
                <BetHistoryRow key={b.id} bet={b} T={T} S={S}/>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

// ── WC Key Gate ──────────────────────────────────────────────────────────────
function WCKeyGate({ onToken }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState("");
  const [testing, setTesting] = useState(false);

  useEffect(() => {
    const stored = localStorage.getItem("sharp_gh_token");
    if (stored) onToken(stored);
  }, []);

  async function connect() {
    if (!val.trim()) { setErr("Enter your GitHub token"); return; }
    setTesting(true); setErr("");
    try {
      const r = await fetch("https://api.github.com/gists/"+GIST_ID, { headers:{Authorization:"token "+val.trim()} });
      if (!r.ok) throw new Error("GitHub token invalid or Gist not accessible");
      localStorage.setItem("sharp_gh_token", val.trim());
      onToken(val.trim());
    } catch(e) { setErr(e.message); }
    setTesting(false);
  }

  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, background:T.navy, borderBottom:"1px solid "+T.border, padding:"10px 16px", display:"flex", gap:10, alignItems:"center", zIndex:100, flexWrap:"wrap" }}>
      <div style={{ fontSize:10, color:T.gold, fontWeight:700 }}>SHARP SIM</div>
      <div style={{ fontSize:9, color:T.muted }}>GitHub token for bet tracking (optional):</div>
      <input style={{ background:T.card, border:"1px solid "+T.border, borderRadius:4, color:T.text, fontFamily:"'IBM Plex Mono','Courier New',monospace", outline:"none", width:240, padding:"5px 10px", fontSize:10 }} type="password" placeholder="ghp_..." value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&connect()} />
      {err && <span style={{ fontSize:9, color:T.red }}>{err}</span>}
      <button onClick={connect} disabled={testing} style={{ background:testing?"#1a2a3e":T.gold, color:"#070b14", border:"none", borderRadius:4, fontWeight:700, letterSpacing:"1px", cursor:testing?"default":"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace", width:"auto", padding:"5px 12px", marginTop:0, fontSize:9 }}>
        {testing?"Connecting...":"Connect"}
      </button>
      <button onClick={()=>onToken(null)} style={{ background:"none", border:"1px solid "+T.border, color:T.muted, padding:"5px 10px", borderRadius:4, fontSize:9, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>
        Skip
      </button>
    </div>
  );
}

function App() {
  const [activeId, setActiveId] = useState(MATCHES[0].id);
  const SIM_CACHE_KEY = "sharp_sim_cache_wc_" + new Date().toLocaleDateString("en-CA");
  const [simData, setSimData] = useState(() => {
    try { return JSON.parse(localStorage.getItem(SIM_CACHE_KEY) || "{}"); } catch(e) { return {}; }
  });
  const [runningId, setRunningId] = useState(null);
  const [runCounts, setRunCounts] = useState({});
  const [ghToken, setGhToken] = useState(localStorage.getItem("sharp_gh_token") || null);
  const [showKeyGate, setShowKeyGate] = useState(!localStorage.getItem("sharp_gh_token"));
  const autoRanRef = useRef(false);

  const betLogger = useBetLogger(ghToken, null);

  const runMatch = useCallback((matchId) => {
    const match = MATCHES.find(m => m.id === matchId);
    if (!match) return;
    setRunningId(matchId);
    setTimeout(() => {
      const raw = runSimulation(match, 100000);
      const agg = aggregate(match, raw);
      setSimData(prev => ({ ...prev, [matchId]: agg }));
      setRunCounts(prev => ({ ...prev, [matchId]: (prev[matchId] || 0) + 1 }));
      setRunningId(null);
    }, 50);
  }, []);

  useEffect(() => {
    if (autoRanRef.current) return;
    autoRanRef.current = true;
    const cached = (() => { try { return JSON.parse(localStorage.getItem(SIM_CACHE_KEY) || "{}"); } catch(e) { return {}; } })();
    const needsSim = MATCHES.filter(m => !cached[m.id]);
    if (!needsSim.length) return;
    let idx = 0;
    function runNext() {
      if (idx >= needsSim.length) return;
      const match = needsSim[idx++];
      setRunningId(match.id);
      setTimeout(() => {
        const raw = runSimulation(match, 100000);
        const agg = aggregate(match, raw);
        setSimData(prev => {
          const next = { ...prev, [match.id]: agg };
          localStorage.setItem(SIM_CACHE_KEY, JSON.stringify(next));
          return next;
        });
        setRunCounts(prev => ({ ...prev, [match.id]: 1 }));
        setRunningId(null);
        setTimeout(runNext, 30);
      }, 50);
    }
    setTimeout(runNext, 200);
  }, []);

  function handleToken(token) {
    setGhToken(token);
    setShowKeyGate(false);
    if (token) localStorage.setItem("sharp_gh_token", token);
  }

  const isParlayTab = activeId === "parlays";
  const isTopPicksTab = activeId === "top_picks";
  const allSimsReady = MATCHES.every(m => !!simData[m.id]);
  const totalSimsLoaded = MATCHES.filter(m => !!simData[m.id]).length;

  // Auto-log at App level so it fires regardless of which tab is active
  const appAutoLoggedRef = useRef(false);
  useEffect(() => {
    if (!allSimsReady || !betLogger.loaded || appAutoLoggedRef.current) return;
    const allBets = [];
    MATCHES.forEach(m => {
      const agg = simData[m.id];
      if (!agg) return;
      const gameObj = { id:m.id, homeTeam:m.homeTeam, awayTeam:m.awayTeam, overUnderLine:m.overUnderLine, overOdds:m.overOdds, underOdds:m.underOdds };
      extractTopBets({...agg, overUnderLine:m.overUnderLine, overOdds:m.overOdds, underOdds:m.underOdds}, gameObj, "WC")
        .forEach(b => allBets.push(b));
    });
    if (!allBets.length) return;
    appAutoLoggedRef.current = true;
    betLogger.logAllBets(allBets);
  }, [allSimsReady, betLogger.loaded]);
  const topBetCount = MATCHES.reduce((acc,m) => {
    const agg = simData[m.id];
    if (!agg) return acc;
    const gameObj = { id:m.id, homeTeam:m.homeTeam, awayTeam:m.awayTeam, overUnderLine:m.overUnderLine };
    return acc + extractTopBets({...agg,overUnderLine:m.overUnderLine},gameObj,"WC").length;
  },0);

  return (
    <div style={{ ...S.wrap, paddingTop: showKeyGate ? 58 : 0 }}>
      {showKeyGate && <WCKeyGate onToken={handleToken}/>}

      {/* TOPBAR */}
      <div style={{ background:T.navy, borderBottom:"1px solid "+T.border, padding:"8px 16px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
        <a href="index.html" style={{ fontSize:10, color:T.muted, letterSpacing:"1px" }}>← Sharp Sim</a>
        <div style={{ flex:1 }}/>
        {betLogger.stats.total > 0 && (
          <div style={{ fontSize:10, color:T.muted }}>
            Record: <span style={{ color:T.green }}>{betLogger.stats.wins}W</span>-<span style={{ color:T.red }}>{betLogger.stats.losses}L</span>
            <span style={{ color:parseFloat(betLogger.stats.totalUnits)>=0?T.green:T.red, marginLeft:6 }}>{parseFloat(betLogger.stats.totalUnits)>=0?"+":""}{betLogger.stats.totalUnits}u</span>
          </div>
        )}
        {!ghToken && <button onClick={()=>setShowKeyGate(true)} style={{ background:"none", border:"1px solid "+T.gold+"44", color:T.gold, padding:"4px 10px", borderRadius:4, fontSize:9, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>Connect Bet Tracker</button>}
        {ghToken && <button onClick={()=>{ localStorage.removeItem("sharp_gh_token"); setGhToken(null); setShowKeyGate(true); }} style={{ background:"none", border:"1px solid "+T.border, color:T.muted, padding:"4px 10px", borderRadius:4, fontSize:9, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>✕ Tracker</button>}
      </div>

      {/* LOADING BAR */}
      {!allSimsReady && (
        <div style={{ background:T.navy, padding:"8px 16px", borderBottom:"1px solid "+T.border, display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ flex:1, height:4, background:T.border, borderRadius:2, overflow:"hidden" }}>
            <div style={{ height:"100%", width:(totalSimsLoaded/MATCHES.length*100)+"%", background:"linear-gradient(90deg,"+T.gold+","+T.green+")", borderRadius:2, transition:"width 0.5s" }}/>
          </div>
          <div style={{ fontSize:9, color:T.muted, whiteSpace:"nowrap" }}>
            {runningId ? ("Simulating "+(MATCHES.find(m=>m.id===runningId)||{}).homeTeam+"...") : "Initializing..."} {totalSimsLoaded}/{MATCHES.length}
          </div>
        </div>
      )}

      {/* TABS */}
      <div style={S.tabBar}>
        {MATCHES.map(m => (
          <button key={m.id} style={S.tab(m.id===activeId && !isParlayTab && !isTopPicksTab)} onClick={()=>setActiveId(m.id)}>
            {m.homeTeam} vs {m.awayTeam}{simData[m.id] ? "" : " ⟳"}
          </button>
        ))}
        <div style={{ flex:1 }}/>
        <button style={{ ...S.tab(isTopPicksTab), color:isTopPicksTab?T.green:T.muted, borderBottom:isTopPicksTab?"2px solid "+T.green:"2px solid transparent", borderLeft:"1px solid "+T.border }}
          onClick={()=>setActiveId("top_picks")}>
          ⭐ TOP PICKS {topBetCount>0?"("+topBetCount+")":""}
        </button>
        <button style={{ ...S.tab(isParlayTab), color:isParlayTab?T.purple:T.muted, borderBottom:isParlayTab?"2px solid "+T.purple:"2px solid transparent" }}
          onClick={()=>setActiveId("parlays")}>
          🎰 PARLAYS {allSimsReady?"":"("+totalSimsLoaded+"/"+MATCHES.length+")"}
        </button>
      </div>

      {isParlayTab && (
        <div>
          <div style={{ ...S.header, background:"linear-gradient(160deg,#0c0d1f 0%,#0a0f1a 100%)" }}>
            <div style={S.glow}/>
            <div style={{ ...S.badge, background:T.purple+"1a", border:"1px solid "+T.purple+"33", color:T.purple }}>🎰 PARLAY BUILDER · LEAN / HIGH / LOCK SIGNALS</div>
            <div style={S.title}>Best Parlays — June 14, 2026</div>
            <div style={S.meta}>All 4 matches · 2/3/4/5-leg combinations · Ranked by joint probability</div>
            <div style={{ ...S.modelTag, background:T.green+"1a", border:"1px solid "+T.green+"33", color:T.green }}>CROSS-MATCH ONLY · NO CORRELATED LEGS · HIGHEST CONFIDENCE FIRST</div>
          </div>
          <ParlayTab simData={simData} betLogger={betLogger}/>
        </div>
      )}

      {isTopPicksTab && <WCTopPicksTab simData={simData} betLogger={betLogger}/>}

      {!isParlayTab && !isTopPicksTab && (
        <MatchView
          match={MATCHES.find(m => m.id === activeId)}
          agg={simData[activeId]}
          running={runningId === activeId}
          runCount={runCounts[activeId] || 0}
          onRun={() => runMatch(activeId)}
          betLogger={betLogger}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
