// ── Team Parameters (2025 WNBA Season) ───────────────────────────────────────

  "New York Liberty":       { abbr:"NYL", ortg:110, drtg:97,  pace:84, color:"#6ECEB2" },
  "Las Vegas Aces":         { abbr:"LVA", ortg:108, drtg:99,  pace:85, color:"#C8B400" },

};
const TEAM_NAMES = Object.keys(TEAM_PARAMS).sort();

// Team name normalization for Odds API inconsistencies
const TEAM_NAME_MAP = {};
function normalizeTeamName(n) { return TEAM_NAME_MAP[n] || n; }

// ── Simulation ────────────────────────────────────────────────────────────────
function randNormal(mean, std) {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return mean + std * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function simulateWNBAGame(homeTeam, awayTeam) {
  const home = TEAM_PARAMS[homeTeam];
  const away = TEAM_PARAMS[awayTeam];

  // Multiplicative efficiency adjustment
  const homeEff = (home.ortg / LEAGUE_AVG) * (away.drtg / LEAGUE_AVG) * LEAGUE_AVG;
  const awayEff = (away.ortg / LEAGUE_AVG) * (home.drtg / LEAGUE_AVG) * LEAGUE_AVG;
  const pace = (home.pace + away.pace) / 2;

  const homeExpPts = homeEff * pace / 100 + HCA / 2;
  const awayExpPts = awayEff * pace / 100 - HCA / 2;

  // Quarter-by-quarter simulation (std dev ~7.5 pts per quarter)
  const Q_STD = 7.5;
  const homeQpts = [], awayQpts = [];
  for (let q = 0; q < 4; q++) {
    homeQpts.push(Math.max(8, Math.round(randNormal(homeExpPts / 4, Q_STD))));
    awayQpts.push(Math.max(8, Math.round(randNormal(awayExpPts / 4, Q_STD))));
  }

  let homeScore = homeQpts.reduce((a, b) => a + b, 0);
  let awayScore = awayQpts.reduce((a, b) => a + b, 0);
  const homeH1 = homeQpts[0] + homeQpts[1];
  const awayH1 = awayQpts[0] + awayQpts[1];

  // OT for ties
  if (homeScore === awayScore) {
    const otH = Math.max(0, Math.round(randNormal(homeExpPts / 10, 4)));
    const otA = Math.max(0, Math.round(randNormal(awayExpPts / 10, 4)));
    if (otH >= otA) { homeScore += otH + 2; awayScore += otA; }
    else { awayScore += otA + 2; homeScore += otH; }
  }

  return { homeScore, awayScore, homeH1, awayH1 };
}

function runWNBASim(homeTeam, awayTeam) {
  if (!TEAM_PARAMS[homeTeam] || !TEAM_PARAMS[awayTeam]) return null;
  const n = 100000;
  let homeWins = 0, awayWins = 0;
  let h1HomeWins = 0, h1AwayWins = 0;
  const homeScores = [], awayScores = [], totals = [], spreads = [], h1Totals = [];

  for (let i = 0; i < n; i++) {
    const { homeScore, awayScore, homeH1, awayH1 } = simulateWNBAGame(homeTeam, awayTeam);
    if (homeScore > awayScore) homeWins++; else awayWins++;
    if (homeH1 > awayH1) h1HomeWins++; else if (awayH1 > homeH1) h1AwayWins++;
    homeScores.push(homeScore);
    awayScores.push(awayScore);
    totals.push(homeScore + awayScore);
    spreads.push(homeScore - awayScore);
    h1Totals.push(homeH1 + awayH1);
  }

  const avg = arr => arr.reduce((a, b) => a + b, 0) / n;
  const pct = (arr, fn) => (arr.filter(fn).length / n * 100).toFixed(1);
  const fmt = (v, d = 1) => parseFloat(v).toFixed(d);

  const avgTotal = avg(totals);
  const avgH1 = avg(h1Totals);
  const avgSpread = avg(spreads);

  // Round total line to nearest 0.5
  const totalLine = Math.round(avgTotal * 2) / 2;
  const h1Line = Math.round(avgH1 * 2) / 2;

  const scoreFreq = {};
  for (let i = 0; i < n; i++) {
    const k = awayScores[i] + "-" + homeScores[i];
    scoreFreq[k] = (scoreFreq[k] || 0) + 1;
  }
  const topScores = Object.entries(scoreFreq).sort((a, b) => b[1] - a[1]).slice(0, 8)
    .map(([score, count]) => ({ score, count, pct: ((count / n) * 100).toFixed(1) }));

  return {
    homeTeam, awayTeam,
    hWPct: fmt(homeWins / n * 100), aWPct: fmt(awayWins / n * 100),
    hWins: homeWins, aWins: awayWins,
    avgHome: fmt(avg(homeScores)), avgAway: fmt(avg(awayScores)),
    avgTotal: fmt(avgTotal), avgH1: fmt(avgH1), avgSpread: fmt(avgSpread),
    totalLine, h1Line,
    overPct: pct(totals, v => v > totalLine),
    underPct: pct(totals, v => v < totalLine),
    over155Pct: pct(totals, v => v > 155), under155Pct: pct(totals, v => v < 155),
    over160Pct: pct(totals, v => v > 160), under160Pct: pct(totals, v => v < 160),
    over165Pct: pct(totals, v => v > 165), under165Pct: pct(totals, v => v < 165),
    over170Pct: pct(totals, v => v > 170), under170Pct: pct(totals, v => v < 170),
    over175Pct: pct(totals, v => v > 175), under175Pct: pct(totals, v => v < 175),
    h1Over75Pct: pct(h1Totals, v => v > 75), h1Under75Pct: pct(h1Totals, v => v < 75),
    h1Over80Pct: pct(h1Totals, v => v > 80), h1Under80Pct: pct(h1Totals, v => v < 80),
    h1Over85Pct: pct(h1Totals, v => v > 85), h1Under85Pct: pct(h1Totals, v => v < 85),
    h1HomeWPct: fmt(h1HomeWins / n * 100), h1AwayWPct: fmt(h1AwayWins / n * 100),
    homeSpread35Pct: pct(spreads, v => v > 3.5),  awaySpread35Pct: pct(spreads, v => v < -3.5),
    homeSpread55Pct: pct(spreads, v => v > 5.5),  awaySpread55Pct: pct(spreads, v => v < -5.5),
    homeSpread75Pct: pct(spreads, v => v > 7.5),  awaySpread75Pct: pct(spreads, v => v < -7.5),
    homeSpread105Pct: pct(spreads, v => v > 10.5), awaySpread105Pct: pct(spreads, v => v < -10.5),
    topScores,
  };
}

// ── Odds API ──────────────────────────────────────────────────────────────────
function formatAge(ts) {
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  return hrs + "h " + (mins % 60) + "m ago";
}

async function fetchWNBAGames({ force = false } = {}) {
  if (!force) {
    try {
      const cached = JSON.parse(localStorage.getItem(ODDS_CACHE_KEY) || "null");
      if (cached && Date.now() - cached.ts < CACHE_TTL) return cached;
    } catch(e) {}
  }
  const url = "/api/odds?sport=" + SPORT_KEY + "&markets=h2h,spreads,totals";
  const res = await fetch(url);
  if (!res.ok) throw new Error("API error: " + res.status);
  const data = await res.json();
  const result = { ts: Date.now(), data };
  localStorage.setItem(ODDS_CACHE_KEY, JSON.stringify(result));
  return result;
}

function parseOddsGame(game) {
  const h2h = {}, spread = {}, total = {};
  (game.bookmakers || []).forEach(bm => {
    (bm.markets || []).forEach(mkt => {
      if (mkt.key === "h2h") {
        mkt.outcomes.forEach(o => {
          if (o.name === game.home_team) h2h.home = o.price;
          else h2h.away = o.price;
        });
      }
      if (mkt.key === "spreads") {
        mkt.outcomes.forEach(o => {
          if (o.name === game.home_team) { spread.homePoint = o.point; spread.homePrice = o.price; }
          else { spread.awayPoint = o.point; spread.awayPrice = o.price; }
        });
      }
      if (mkt.key === "totals") {
        mkt.outcomes.forEach(o => {
          if (o.name === "Over") { total.line = o.point; total.overPrice = o.price; }
          else { total.underPrice = o.price; }
        });
      }
    });
  });
  if (!h2h.home && !h2h.away) return null;
  return {
    id: game.id,
    homeTeam: normalizeTeamName(game.home_team),
    awayTeam: normalizeTeamName(game.away_team),
    commenceTime: game.commence_time,
    h2h, spread, total,
  };
}

// ── Gist helpers ──────────────────────────────────────────────────────────────
async function gistRead() {
  const res = await fetch("/api/gist");
  if (!res.ok) throw new Error("Gist read failed");
  const data = await res.json();
  return JSON.parse((data.files[GIST_FILE] || {}).content || "[]");
}
async function gistWrite(bets) {
  await fetch("/api/gist", {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(bets, null, 2) } } }),
  });
}

// ── Odds helpers ──────────────────────────────────────────────────────────────
function fmtOdds(v) {
  if (v == null) return "—";
  return v > 0 ? "+" + v : String(v);
}
function impliedProb(odds) {
  if (!odds) return 0;
  return odds < 0 ? (-odds / (-odds + 100)) * 100 : (100 / (odds + 100)) * 100;
}
function tierToUnits(t) { return t==="LOCK"?2:t==="HIGH"?1.5:1; }
function kellyUnits(simPctStr, bookOddsStr, tier) {
  const p = parseFloat(simPctStr) / 100;
  const oddsNum = parseFloat((bookOddsStr || "").replace(/^~/, ""));
  if (!isNaN(oddsNum) && oddsNum !== 0) {
    const b = oddsNum > 0 ? oddsNum / 100 : 100 / Math.abs(oddsNum);
    const kelly = (b * p - (1 - p)) / b;
    if (kelly > 0) return parseFloat(Math.min(3, kelly * 15).toFixed(1));
  }
  return tierToUnits(tier);
}
function tierColor(t, T) { return t==="LOCK"?T.red:t==="HIGH"?T.green:t==="LEAN"?T.gold:T.muted; }

// ── Stats ─────────────────────────────────────────────────────────────────────
function calcStats(bets) {
  const resolved = bets.filter(b => b.result !== "pending");
  const wins = resolved.filter(b => b.result === "win");
  const losses = resolved.filter(b => b.result === "loss");
  const pushes = resolved.filter(b => b.result === "push");
  const totalUnits = resolved.reduce((a, b) => a + (b.result === "win" ? b.units : b.result === "loss" ? -b.units : 0), 0);
  const bySport = {};
  const bySportTier = {};
  resolved.forEach(b => {
    if (!bySport[b.sport]) bySport[b.sport] = { wins:0, losses:0, pushes:0, units:0 };
    bySport[b.sport].units += b.result === "win" ? b.units : b.result === "loss" ? -b.units : 0;
    if (b.result === "win") bySport[b.sport].wins++;
    else if (b.result === "loss") bySport[b.sport].losses++;
    else bySport[b.sport].pushes++;
    const tier = b.tier || "OTHER";
    if (!bySportTier[b.sport]) bySportTier[b.sport] = {};
    if (!bySportTier[b.sport][tier]) bySportTier[b.sport][tier] = { wins:0, losses:0, pushes:0, units:0 };
    bySportTier[b.sport][tier].units += b.result === "win" ? b.units : b.result === "loss" ? -b.units : 0;
    if (b.result === "win") bySportTier[b.sport][tier].wins++;
    else if (b.result === "loss") bySportTier[b.sport][tier].losses++;
    else bySportTier[b.sport][tier].pushes++;
  });
  return {
    total: resolved.length, wins: wins.length, losses: losses.length, pushes: pushes.length,
    winPct: resolved.length ? ((wins.length / (resolved.length - pushes.length)) * 100).toFixed(1) : "—",
    totalUnits: totalUnits.toFixed(1),
    pending: bets.filter(b => b.result === "pending").length,
    bySport, bySportTier,
  };
}

// ── Extract top bets ──────────────────────────────────────────────────────────
function extractTopBets(agg, game) {
  const bets = [];
  const gameId = game ? game.id : (agg.homeTeam + "|" + agg.awayTeam);
  const homeTeam = agg.homeTeam || game.homeTeam;
  const awayTeam = agg.awayTeam || game.awayTeam;
  const hasOdds = game && game.h2h && game.h2h.home;
  const hImp = hasOdds ? impliedProb(game.h2h.home) : 0;
  const aImp = hasOdds ? impliedProb(game.h2h.away) : 0;
  const totalLine = hasOdds && game.total.line ? game.total.line : agg.totalLine;
  const spreadLine = hasOdds && game.spread.homePoint != null ? game.spread.homePoint : null;

  function push(market, simPct, bookOdds, tier) {
    bets.push({
      id: Date.now() + "_" + Math.random().toString(36).slice(2, 7),
      sport: "WNBA", gameId, homeTeam, awayTeam,
      market, simPct, bookOdds,
      tier, units: kellyUnits(simPct, bookOdds, tier),
      loggedAt: new Date().toISOString(),
      result: "pending", resolvedAt: null, finalScore: null,
      gameDate: new Date().toLocaleDateString("en-CA"),
    });
  }

  const checks = [
    { market: homeTeam + " ML", pct: parseFloat(agg.hWPct), imp: hImp, odds: hasOdds ? fmtOdds(game.h2h.home) : "—" },
    { market: awayTeam + " ML", pct: parseFloat(agg.aWPct), imp: aImp, odds: hasOdds ? fmtOdds(game.h2h.away) : "—" },
    { market: "Over " + totalLine + " Total", pct: parseFloat(agg.overPct), imp: 0, odds: hasOdds ? fmtOdds(game.total.overPrice) : "—" },
    { market: "Under " + totalLine + " Total", pct: parseFloat(agg.underPct), imp: 0, odds: hasOdds ? fmtOdds(game.total.underPrice) : "—" },
    { market: homeTeam + " H1 ML", pct: parseFloat(agg.h1HomeWPct), imp: 0, odds: "~ML" },
    { market: awayTeam + " H1 ML", pct: parseFloat(agg.h1AwayWPct), imp: 0, odds: "~ML" },
    { market: "Over " + agg.h1Line + " H1 Total", pct: parseFloat(agg.h1Over80Pct), imp: 0, odds: "~-110" },
    { market: "Under " + agg.h1Line + " H1 Total", pct: parseFloat(agg.h1Under80Pct), imp: 0, odds: "~-110" },
  ];

  // Add spread if available
  if (spreadLine != null) {
    const favTeam = spreadLine < 0 ? homeTeam : awayTeam;
    const dogTeam = spreadLine < 0 ? awayTeam : homeTeam;
    const favPt = spreadLine < 0 ? spreadLine : game.spread.awayPoint;
    const dogPt = spreadLine < 0 ? game.spread.awayPoint : spreadLine;
    const favCoverPct = spreadLine < 0
      ? parseFloat(agg["homeSpread" + Math.abs(favPt).toString().replace(".", "") + "Pct"] || agg.homeSpread55Pct)
      : parseFloat(agg["awaySpread" + Math.abs(favPt).toString().replace(".", "") + "Pct"] || agg.awaySpread55Pct);
    checks.push(
      { market: favTeam + " " + (favPt > 0 ? "+" : "") + favPt, pct: favCoverPct, imp: 0, odds: hasOdds ? fmtOdds(spreadLine < 0 ? game.spread.homePrice : game.spread.awayPrice) : "—" },
      { market: dogTeam + " " + (dogPt > 0 ? "+" : "") + dogPt, pct: 100 - favCoverPct, imp: 0, odds: hasOdds ? fmtOdds(spreadLine < 0 ? game.spread.awayPrice : game.spread.homePrice) : "—" },
    );
  }

  checks.forEach(({ market, pct, imp, odds }) => {
    if (pct >= 70) push(market, pct.toFixed(1) + "%", odds, "LOCK");
    else if (pct >= 60) push(market, pct.toFixed(1) + "%", odds, "HIGH");
    else if (pct > 52 && pct > imp + 3) push(market, pct.toFixed(1) + "%", odds, "LEAN");
  });

  return bets.sort((a, b) => parseFloat(b.simPct) - parseFloat(a.simPct));
}

// ── Bet Logger ────────────────────────────────────────────────────────────────
function useBetLogger() {
  const [bets, setBets] = useState([]);
  const [saving, setSaving] = useState(false);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    gistRead().then(data => {
      setBets(data);
      setLoaded(true);
    }).catch(e => { console.error(e); setLoaded(true); });
  }, []);

  async function logAllBets(newBets) {
    if (!newBets.length) return;
    setSaving(true);
    const today = new Date().toLocaleDateString("en-CA");
    const existingKeys = new Set(bets.filter(b => b.gameDate === today).map(b => b.gameId + "|" + b.market));
    const toAdd = newBets.filter(b => !existingKeys.has(b.gameId + "|" + b.market));
    if (!toAdd.length) { setSaving(false); return; }
    const updated = [...bets, ...toAdd];
    setBets(updated);
    try { await gistWrite(updated); } catch(e) { console.error(e); }
    setSaving(false);
  }

  async function removeBet(id) {
    const updated = bets.filter(b => b.id !== id);
    setBets(updated);
    try { await gistWrite(updated); } catch(e) { console.error(e); }
  }

  const stats = calcStats(bets);
  const today = new Date().toLocaleDateString("en-CA");
  const isLogged = (gameId, market) => bets.some(b => b.gameId === gameId && b.market === market && b.gameDate === today);

  return { bets, stats, logAllBets, removeBet, saving, loaded, isLogged };
}

function sigLabel(simPct, imp=0, lockT=70, highT=60, leanT=52) {
  const s = parseFloat(simPct);

  if (s > leanT && (imp===0 || s > imp + 3)) return "LEAN";
  return "PASS";
}

  allBets.sort((a, b) => parseFloat(b.simPct) - parseFloat(a.simPct));

  const simsReady = games.filter(g => simData[g.homeTeam + "|" + g.awayTeam]).length;
  const allSimsReady = simsReady === games.length && games.length > 0;

  const locks = allBets.filter(b => b.tier === "LOCK");
  const highs = allBets.filter(b => b.tier === "HIGH");
  const leans = allBets.filter(b => b.tier === "LEAN");

  return (
    <div style={S.body}>

      {!allSimsReady && (
        <div style={{ ...S.card, color:T.muted, fontSize:10, textAlign:"center", padding:20 }}>
          {simsReady}/{games.length} sims complete — visit each game tab to run simulations
        </div>

      {allSimsReady && allBets.length === 0 && (
        <div style={{ ...S.card, color:T.muted, fontSize:10, textAlign:"center", padding:20 }}>No signals above threshold for today's slate.</div>
      )}

      {locks.length > 0 && (
        <div style={S.sec}>
          <div style={S.secLabel}>🔒 LOCKS ({locks.length})</div>
          {locks.map(b => <TopBetCard key={b.gameId + b.market} bet={b} logged={isLogged(b.gameId, b.market)}/>)}
        </div>
      )}
      {highs.length > 0 && (
        <div style={S.sec}>
          <div style={S.secLabel}>⭐ HIGH CONFIDENCE ({highs.length})</div>
          {highs.map(b => <TopBetCard key={b.gameId + b.market} bet={b} logged={isLogged(b.gameId, b.market)}/>)}
        </div>
      )}
      {leans.length > 0 && (
        <div style={S.sec}>
          <div style={S.secLabel}>LEAN ({leans.length})</div>
          {leans.map(b => <TopBetCard key={b.gameId + b.market} bet={b} logged={isLogged(b.gameId, b.market)}/>)}
        </div>
      )}

      {betLogger.bets.filter(b => b.sport === "WNBA").length > 0 && (
        <div style={S.sec}>
          <div style={S.secLabel}>Bet Log — WNBA</div>
          <div style={S.card}>
            {betLogger.bets.filter(b => b.sport === "WNBA").slice().reverse().map(b => (
              <BetHistoryRow key={b.id} bet={b}/>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Parlay Builder ────────────────────────────────────────────────────────────
const PARLAY_SIZE_LABELS = { 2:"2-Leg", 3:"3-Leg", 4:"4-Leg", 5:"5-Leg" };

function buildWNBAParlays(simData, games) {
  const allLegs = [];
  games.forEach(game => {
    const key = game.homeTeam + "|" + game.awayTeam;
    const agg = simData[key];
    if (!agg) return;
    extractTopBets(agg, game).forEach(b => {
      allLegs.push({ matchId: key, match: b.awayTeam + " @ " + b.homeTeam,
        market: b.market, prob: parseFloat(b.simPct)/100, probPct: b.simPct, tier: b.tier, units: b.units });
    });
  });

  if (allLegs.length === 0) return { legs: allLegs, parlays: [] };

  function buildCombos(legs, size) {
    const results = [];
    function combine(start, current) {
      if (current.length === size) { results.push([...current]); return; }
      for (let i = start; i < legs.length; i++) {
        if (!current.map(l => l.matchId).includes(legs[i].matchId)) {
          current.push(legs[i]); combine(i+1, current); current.pop();
        }
      }
    }
    combine(0, []);
    return results;
  }

  const parlays = [];
  [2,3,4,5].forEach(function(size) {
    buildCombos(allLegs, size).forEach(combo => {
      const jp = combo.reduce((acc,leg) => acc * leg.prob, 1);
      parlays.push({ legs:combo, size, jointProb:jp, jointProbPct:(jp*100).toFixed(2) });
    });
  });
  parlays.sort((a,b) => b.jointProb - a.jointProb);
  return { legs: allLegs, parlays: parlays.slice(0,40) };
}

  const [filterSize, setFilterSize] = useState("all");

    return (

          {games.map(g => {
            const ready = !!simData[g.homeTeam+"|"+g.awayTeam];
            return (
              <div key={g.id} style={{ background:ready?T.green+"22":T.card, border:"1px solid "+(ready?T.green:T.border), borderRadius:4, padding:"4px 10px", fontSize:10, color:ready?T.green:T.muted }}>
                {ready?"✓":"○"} {TEAM_PARAMS[g.awayTeam]?.abbr||"?"} @ {TEAM_PARAMS[g.homeTeam]?.abbr||"?"}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  const { legs, parlays } = buildWNBAParlays(simData, games);
  const filtered = filterSize==="all" ? parlays : parlays.filter(p=>p.size===parseInt(filterSize));

  return (
    <div style={{ maxWidth:920, margin:"0 auto", padding:"0 14px 48px" }}>
      <div style={S.sec}>
        <div style={{ ...S.card, background:"#0a1020", border:"1px solid "+T.accent+"33" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
            <div>
              <div style={{ fontSize:11, color:T.accent, fontWeight:700, letterSpacing:"1px" }}>WNBA PARLAY BUILDER</div>
              <div style={{ fontSize:10, color:T.muted, marginTop:3 }}>
                {legs.length} qualifying legs · {simsReady} games simulated · 2/3/4/5-leg cross-game combos · Sorted by joint probability
              </div>
            </div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              <span style={{ background:T.red+"22", border:"1px solid "+T.red+"44", color:T.red, fontSize:"9px", padding:"2px 7px", borderRadius:3, fontWeight:700 }}>LOCK ≥70%</span>
              <span style={{ background:T.green+"22", border:"1px solid "+T.green+"44", color:T.green, fontSize:"9px", padding:"2px 7px", borderRadius:3, fontWeight:700 }}>HIGH ≥60%</span>
              <span style={{ background:T.gold+"22", border:"1px solid "+T.gold+"44", color:T.gold, fontSize:"9px", padding:"2px 7px", borderRadius:3, fontWeight:700 }}>LEAN &gt;52%</span>
            </div>
          </div>
        </div>
      </div>

      <div style={S.sec}>
        <div style={S.secLabel}>Signal Pool ({legs.length} legs)</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {legs.map((leg,i) => {
            const tc = tierColor(leg.tier, T);
            return (
              <div key={i} style={{ background:T.card, border:"1px solid "+T.border, borderLeft:"3px solid "+tc, borderRadius:4, padding:"5px 10px", fontSize:10, display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ background:tc+"22", color:tc, fontSize:"8px", fontWeight:700, padding:"1px 5px", borderRadius:2 }}>{leg.tier}</span>
                <span style={{ color:T.muted, fontSize:9 }}>{leg.match} ·</span>
                <span style={{ color:T.text, fontWeight:700 }}>{leg.market}</span>
                <span style={{ color:tc, marginLeft:2 }}>{leg.probPct}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ ...S.sec, display:"flex", gap:6, flexWrap:"wrap" }}>
        {["all","2","3","4","5"].map(v=>(
          <button key={v} onClick={()=>setFilterSize(v)} style={{ padding:"6px 14px", fontSize:10, fontWeight:700, letterSpacing:"1px", background:filterSize===v?T.accent:T.card, color:filterSize===v?"#070b14":T.muted, border:"1px solid "+(filterSize===v?T.accent:T.border), borderRadius:4, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>
            {v==="all"?"ALL":v+"-LEG"}
          </button>
        ))}
        <div style={{ marginLeft:"auto", fontSize:10, color:T.muted, alignSelf:"center" }}>Showing {filtered.length} parlays</div>
      </div>

      {filtered.length===0 && <div style={{ ...S.card, textAlign:"center", padding:32, color:T.muted, fontSize:11, marginTop:12 }}>Not enough cross-game signals for {filterSize}-leg parlays.</div>}

      {filtered.map((parlay,pi) => {
        const jp = parlay.jointProb;
        const fairOdds = jp > 0 ? (jp < 0.5 ? "+" + Math.round((1/jp-1)*100) : "-" + Math.round((jp/(1-jp))*100)) : "—";
        const rankColor = pi===0?T.gold:pi===1?"#94a3b8":pi===2?"#cd7f32":T.border;

        const parlayBet = {

          tier: parlay.legs[0].tier, units: Math.min(parseFloat(totalUnits), 2),
          loggedAt: new Date().toISOString(), result:"pending",
          resolvedAt:null, finalScore:null,
          gameDate: new Date().toISOString().slice(0,10),

        return (

              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ background:pi<3?rankColor+"22":T.navy, border:"1px solid "+(pi<3?rankColor:T.border), color:pi<3?rankColor:T.muted, fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:3 }}>#{pi+1}</div>
                <div style={{ background:T.purple+"1a", border:"1px solid "+T.purple+"33", color:T.purple, fontSize:9, padding:"2px 8px", borderRadius:3, letterSpacing:"1px" }}>{PARLAY_SIZE_LABELS[parlay.size]}</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:22, fontWeight:700, color:jp>0.4?T.green:jp>0.2?T.gold:T.red }}>{parlay.jointProbPct}%</div>
                  <div style={{ fontSize:9, color:T.muted }}>joint probability</div>
                </div>
                <button onClick={()=>betLogger.logAllBets([parlayBet])} style={{ background:T.accent, color:"#070b14", border:"none", borderRadius:4, padding:"6px 12px", fontSize:9, fontWeight:700, cursor:"pointer", fontFamily:"'IBM Plex Mono','Courier New',monospace" }}>
                  + LOG
                </button>
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
              {parlay.legs.map((leg,li) => {
                const tc = tierColor(leg.tier, T);
                return (
                  <div key={li} style={{ display:"flex", alignItems:"center", gap:8, background:T.navy, borderRadius:4, padding:"7px 10px", borderLeft:"2px solid "+tc }}>
                    <span style={{ background:tc+"22", color:tc, fontSize:"8px", fontWeight:700, padding:"1px 5px", borderRadius:2, minWidth:32, textAlign:"center" }}>{leg.tier}</span>
                    <div style={{ fontSize:9, color:T.muted, minWidth:110 }}>{leg.match}</div>
                    <div style={{ flex:1, fontSize:11, color:T.text, fontWeight:600 }}>{leg.market}</div>
                    <div style={{ fontSize:9, color:T.purple }}>{leg.units}u</div>
                    <div style={{ fontSize:11, color:tc, fontWeight:700, minWidth:44, textAlign:"right" }}>{leg.probPct}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", gap:16, marginTop:10, flexWrap:"wrap" }}>
              <div><div style={{ fontSize:9, color:T.muted }}>JOINT PROB</div><div style={{ fontSize:13, fontWeight:700 }}>{parlay.jointProbPct}%</div></div>
              <div><div style={{ fontSize:9, color:T.muted }}>FAIR ODDS (no vig)</div><div style={{ fontSize:13, fontWeight:700, color:T.gold }}>{fairOdds}</div></div>
              <div><div style={{ fontSize:9, color:T.muted }}>LEGS</div><div style={{ fontSize:13, fontWeight:700, color:T.purple }}>{parlay.size}</div></div>
              <div><div style={{ fontSize:9, color:T.muted }}>TOTAL UNITS</div><div style={{ fontSize:13, fontWeight:700, color:T.green }}>{totalUnits}u</div></div>
            </div>
          </div>
        );
      })}
      <div style={S.disclaimer}>Parlay legs assumed independent across games. Fair odds before vig. Not professional betting advice. Gamble responsibly.</div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [games, setGames] = useState([]);
  const [activeTab, setActiveTab] = useState("game_0");
  const [simData, setSimData] = useState(() => {
    try { return JSON.parse(localStorage.getItem(SIM_CACHE_KEY) || "{}"); } catch(e) { return {}; }
  });
  const [runningId, setRunningId] = useState(null);
  const [runCounts, setRunCounts] = useState({});
  const [lastFetched, setLastFetched] = useState(() => {
    try { const c = JSON.parse(localStorage.getItem(ODDS_CACHE_KEY) || "null"); return c ? c.ts : null; } catch(e) { return null; }
  });
  const [loadingGames, setLoadingGames] = useState(false);
  const [gamesError, setGamesError] = useState("");

  const betLogger = useBetLogger();

  // App-level auto-log
  const appAutoLoggedRef = useRef(false);
  const allSimsReady = games.length > 0 && games.every(g => simData[g.homeTeam + "|" + g.awayTeam]);
  useEffect(() => {
    if (!allSimsReady || !betLogger.loaded || appAutoLoggedRef.current) return;
    const allBets = [];
    games.forEach(game => {
      const agg = simData[game.homeTeam + "|" + game.awayTeam];
      if (!agg) return;
      extractTopBets(agg, game).forEach(b => allBets.push({ ...b, gameTime: game.commenceTime }));
    });
    if (!allBets.length) return;
    appAutoLoggedRef.current = true;
    betLogger.logAllBets(allBets);
  }, [allSimsReady, betLogger.loaded]);

  async function loadGames(opts = {}) {
    setLoadingGames(true); setGamesError("");
    try {
      const result = await fetchWNBAGames(opts);
      setLastFetched(result.ts);
      const today = new Date().toLocaleDateString("en-CA");
      const parsed = (result.data || [])
        .filter(g => new Date(g.commence_time).toLocaleDateString("en-CA") === today)
        .map(parseOddsGame).filter(Boolean);
      setGames(parsed);
      if (parsed.length > 0 && activeTab === "top_picks") {
        // auto-sim uncached games
        const uncached = parsed.filter(g => !simData[g.homeTeam + "|" + g.awayTeam]
          && TEAM_PARAMS[g.homeTeam] && TEAM_PARAMS[g.awayTeam]);
        if (uncached.length > 0) {
          runAutoSim(uncached, 0);
        }
      }
    } catch(e) { setGamesError(e.message); }
    setLoadingGames(false);
  }

  function runAutoSim(queue, idx) {
    if (idx >= queue.length) return;
    const g = queue[idx];
    const key = g.homeTeam + "|" + g.awayTeam;
    setRunningId(key);
    setTimeout(() => {
      const result = runWNBASim(g.homeTeam, g.awayTeam);
      if (result) {
        setSimData(prev => {
          const next = { ...prev, [key]: result };
          localStorage.setItem(SIM_CACHE_KEY, JSON.stringify(next));
          return next;
        });
      }
      setRunningId(null);
      runAutoSim(queue, idx + 1);
    }, 50);
  }

  useEffect(() => {
    loadGames();
  }, []);

  function runSim(game) {
    if (!game || runningId) return;
    const key = game.homeTeam + "|" + game.awayTeam;
    setRunningId(key);
    setTimeout(() => {
      const result = runWNBASim(game.homeTeam, game.awayTeam);
      if (result) {
        setSimData(prev => {
          const next = { ...prev, [key]: result };
          localStorage.setItem(SIM_CACHE_KEY, JSON.stringify(next));
          return next;
        });
        setRunCounts(prev => ({ ...prev, [key]: (prev[key] || 0) + 1 }));
      }
      setRunningId(null);
    }, 50);
  }

  const activeGameIdx = activeTab.startsWith("game_") ? parseInt(activeTab.split("_")[1]) : 0;
  const isSpecialTab = activeTab === "top_picks" || activeTab === "parlays";
  const activeGame = isSpecialTab ? null : games[activeGameIdx];
  const gameKey = activeGame ? activeGame.homeTeam + "|" + activeGame.awayTeam : null;
  const topBetCount = (() => {
    let n = 0;
    games.forEach(g => {
      const agg = simData[g.homeTeam + "|" + g.awayTeam];
      if (agg) n += extractTopBets(agg, g).length;
    });
    return n;
  })();

  return (
    <div style={S.wrap}>
      {/* Nav */}
      <div style={{ background:T.navy, borderBottom:"1px solid "+T.border, padding:"10px 16px", display:"flex", alignItems:"center", gap:12, justifyContent:"space-between" }}>
        <a href="index.html" style={{ fontSize:9, color:T.muted, letterSpacing:"1px" }}>← SHARP SIM</a>
        <div style={{ flex:1 }}/>
        {(() => { const sp = betLogger.stats.bySport && betLogger.stats.bySport["WNBA"]; return sp && (sp.wins+sp.losses) > 0 && (
          <div style={{ fontSize:10, color:T.muted }}>
            WNBA: <span style={{ color:T.green }}>{sp.wins}W</span>-<span style={{ color:T.red }}>{sp.losses}L</span>
            <span style={{ color:sp.units>=0?T.green:T.red, marginLeft:6 }}>{sp.units>=0?"+":""}{sp.units.toFixed(1)}u</span>
          </div>
        ); })()}
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          {lastFetched && <span style={{ fontSize:9, color:T.muted }}>fetched {formatAge(lastFetched)}</span>}
          <button style={{ background:"none", border:"1px solid "+T.border, color:T.muted, fontSize:9, padding:"4px 10px", borderRadius:3, cursor:"pointer", fontFamily:"inherit" }}
            onClick={() => loadGames({ force: true })} disabled={loadingGames}>
            {loadingGames ? "..." : "⟳ Refresh"}
          </button>
        </div>
      </div>

      {/* Game tabs */}
      <div style={S.tabBar}>
        {games.map((g, i) => (
          <button key={g.id} style={S.tab(activeTab === "game_" + i)} onClick={() => setActiveTab("game_" + i)}>
            {(TEAM_PARAMS[g.awayTeam]?.abbr || g.awayTeam.split(" ").pop())} @ {(TEAM_PARAMS[g.homeTeam]?.abbr || g.homeTeam.split(" ").pop())}
            {runningId === (g.homeTeam + "|" + g.awayTeam) ? " ⟳" : !simData[g.homeTeam + "|" + g.awayTeam] ? " ·" : ""}
          </button>
        ))}
        <div style={{ flex:1 }}/>
        <button style={{ ...S.tab(activeTab === "top_picks"), color:activeTab==="top_picks"?T.green:T.muted, borderBottom:activeTab==="top_picks"?"2px solid "+T.green:"2px solid transparent", borderLeft:"1px solid "+T.border }}
          onClick={() => setActiveTab("top_picks")}>
          ⭐ TOP PICKS {topBetCount > 0 ? "(" + topBetCount + ")" : ""}
        </button>
        <button style={{ ...S.tab(activeTab === "parlays"), color:activeTab==="parlays"?T.purple:T.muted, borderBottom:activeTab==="parlays"?"2px solid "+T.purple:"2px solid transparent", borderLeft:"1px solid "+T.border }}
          onClick={() => setActiveTab("parlays")}>
          🎲 PARLAYS
        </button>
      </div>

      {gamesError && (
        <div style={{ background:T.red+"22", border:"1px solid "+T.red+"44", color:T.red, padding:"10px 16px", fontSize:10 }}>
          Error loading games: {gamesError}
        </div>
      )}

      {loadingGames && games.length === 0 && (
        <div style={{ padding:40, textAlign:"center", color:T.muted, fontSize:10 }}>Loading today's WNBA games...</div>
      )}

      {!loadingGames && games.length === 0 && !gamesError && (
        <div style={{ padding:40, textAlign:"center", color:T.muted, fontSize:10 }}>No WNBA games scheduled for today.</div>
      )}

      {activeTab === "top_picks" && <TopPicksTab simData={simData} games={games} betLogger={betLogger}/>}
      {activeTab === "parlays" && <WNBAParlayTab simData={simData} games={games} betLogger={betLogger}/>}
      {!isSpecialTab && activeGame && (
        <GameSimView
          game={activeGame}
          agg={simData[gameKey]}
          running={runningId === gameKey}
          runCount={runCounts[gameKey] || 0}
          onRun={() => runSim(activeGame)}
          betLogger={betLogger}
        />
      )}
      {!isSpecialTab && activeGame && !TEAM_PARAMS[activeGame.homeTeam] && (
        <div style={{ padding:20, color:T.yellow, fontSize:10 }}>
          Team not in model: {activeGame.homeTeam} or {activeGame.awayTeam} — parameters not yet calibrated.
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
